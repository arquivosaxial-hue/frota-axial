// Login do validador
function LoginValidador({ onEntrar, onVoltar }) {
  const [senha, setSenha] = useState('');
  const [erro, setErro] = useState(false);
  function entrar() {
    if (senha === SENHA_VALIDADOR) onEntrar();
    else { setErro(true); setSenha(''); }
  }
  return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
      <div style={{...S.card, maxWidth:380, width:'100%', textAlign:'center', padding:28}}>
        <div style={{width:60, height:60, borderRadius:16, background:COR.verde, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px'}}>
          <CheckCircle2 size={30} color="#fff" />
        </div>
        <h2 style={{margin:'0 0 6px', fontSize:22, fontWeight:800, color:COR.azul}}>Validador</h2>
        <p style={{margin:'0 0 20px', color:COR.cinza, fontSize:14}}>Validação de registros de campo</p>
        <div style={{position:'relative', marginBottom:12}}>
          <Lock size={18} color={COR.cinza} style={{position:'absolute', left:13, top:'50%', transform:'translateY(-50%)'}}/>
          <input type="password" value={senha} placeholder="Senha" autoFocus
            style={{...S.campo, paddingLeft:42, borderColor: erro ? COR.vermelho : COR.borda}}
            onChange={e => { setSenha(e.target.value); setErro(false); }}
            onKeyDown={e => e.key === 'Enter' && entrar()} />
        </div>
        {erro && <p style={{color:COR.vermelho, fontSize:13, margin:'0 0 12px', fontWeight:600}}>Senha incorreta.</p>}
        <button onClick={entrar} style={{...S.botaoPrim, width:'100%', background:COR.verde}}>Entrar</button>
        {onVoltar && <button onClick={onVoltar} style={{...S.botaoSec, width:'100%', marginTop:10, border:'none'}}>Voltar</button>}
      </div>
    </div>
  );
}

// Validador: escolher a obra
function ValidadorSelecionaObra({ maquinas, registros, onEscolher, onVoltar }) {
  // conta registros pendentes de validação por obra
  const pendentesPorObra = {};
  for (const r of registros) {
    if (r.validacaoStatus !== 'pendente') continue;
    const nome = r.obra || 'Sem obra';
    pendentesPorObra[nome] = (pendentesPorObra[nome] || 0) + 1;
  }
  // máquinas sem checklist hoje e com dias atrasados, por obra
  const hoje = new Date().toISOString().slice(0,10);
  const comCheckHoje = new Set(registros.filter(r => new Date(r.criadoEm).toISOString().slice(0,10) === hoje).map(r => r.maquinaId));
  const semCheckPorObra = {};
  const atrasoPorObra = {};
  for (const m of maquinas.filter(x => x.ativa)) {
    const nome = m.obra || 'Sem obra';
    if (!comCheckHoje.has(m.id)) semCheckPorObra[nome] = (semCheckPorObra[nome] || 0) + 1;
    if (diasPendentesMaquina(m, registros).length > 0) atrasoPorObra[nome] = (atrasoPorObra[nome] || 0) + 1;
  }
  const obras = Array.from(new Set(maquinas.filter(m=>m.ativa).map(m => m.obra || 'Sem obra'))).sort((a,b)=>a.localeCompare(b,'pt-BR'));

  function Pilula({ n, texto, fg, bg }) {
    return (
      <span style={{display:'inline-flex', alignItems:'center', gap:5, fontSize:12, fontWeight:700, color:fg, background:bg, padding:'3px 10px', borderRadius:999}}>
        <b style={{fontSize:13}}>{n}</b> {texto}
      </span>
    );
  }

  return (
    <div style={{maxWidth:560, margin:'0 auto'}}>
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:18}}>
        <button onClick={onVoltar} style={{...S.botaoSec, padding:10, borderRadius:10}} aria-label="Voltar"><ArrowLeft size={20}/></button>
        <div>
          <h2 style={{margin:0, fontSize:22, fontWeight:800, color:COR.azul}}>Selecione a obra</h2>
          <p style={{margin:'2px 0 0', color:COR.cinza, fontSize:13.5}}>{obras.length} obra(s)</p>
        </div>
      </div>
      <div style={{display:'flex', flexDirection:'column', gap:10}}>
        {obras.map(nome => {
          const pend = pendentesPorObra[nome] || 0;
          const semCheck = semCheckPorObra[nome] || 0;
          const atraso = atrasoPorObra[nome] || 0;
          const temAlgo = pend > 0 || semCheck > 0 || atraso > 0;
          return (
            <button key={nome} onClick={() => onEscolher(nome)} style={{display:'flex', alignItems:'center', gap:12, background:'#fff', border:`1.5px solid ${temAlgo ? '#FDE68A' : COR.borda}`, borderRadius:14, padding:'15px 16px', cursor:'pointer', fontFamily:'inherit', textAlign:'left', width:'100%'}}>
              <div style={{width:42, height:42, borderRadius:11, background:'#EFF6FF', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}><Building size={22} color={COR.azul}/></div>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:15.5, fontWeight:700, color:COR.texto, marginBottom: temAlgo ? 6 : 0}}>{nome}</div>
                {temAlgo ? (
                  <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                    {pend > 0 && <Pilula n={pend} texto="p/ validar" fg="#92400E" bg="#FDE68A"/>}
                    {semCheck > 0 && <Pilula n={semCheck} texto="sem checklist hoje" fg="#991B1B" bg={COR.vermelhoBg}/>}
                    {atraso > 0 && <Pilula n={atraso} texto="c/ atraso" fg="#9A3412" bg="#FFEDD5"/>}
                  </div>
                ) : (
                  <div style={{fontSize:12.5, color:COR.verde, fontWeight:600, display:'flex', alignItems:'center', gap:4}}><CheckCircle2 size={13}/> Tudo em dia</div>
                )}
              </div>
              <ChevronRight size={20} color={COR.cinza} style={{flexShrink:0}}/>
            </button>
          );
        })}
        {obras.length === 0 && <p style={{textAlign:'center', color:COR.cinza, padding:'30px 0'}}>Nenhuma obra com máquinas ativas.</p>}
      </div>
    </div>
  );
}

// Validador: lista de registros pendentes da obra + validar/invalidar
function ValidadorRegistros({ obra, registros, maquinas, onValidar, onVoltar }) {
  const [expandido, setExpandido] = useState(null);
  const [invalidando, setInvalidando] = useState(null); // id do registro em modo "informar motivo"
  const [motivo, setMotivo] = useState('');
  const [processando, setProcessando] = useState(null);

  const mapaMaq = {}; for (const m of maquinas) mapaMaq[m.id] = m;

  const pendentes = registros
    .filter(r => r.validacaoStatus === 'pendente' && (r.obra || 'Sem obra') === obra)
    .sort((a,b) => new Date(b.criadoEm) - new Date(a.criadoEm));

  // máquinas da obra que ainda NÃO fizeram checklist HOJE
  const hoje = new Date().toISOString().slice(0,10);
  const maquinasComCheckHoje = new Set(
    registros
      .filter(r => new Date(r.criadoEm).toISOString().slice(0,10) === hoje)
      .map(r => r.maquinaId)
  );
  const semChecklistHoje = maquinas
    .filter(m => m.ativa && (m.obra || 'Sem obra') === obra && !maquinasComCheckHoje.has(m.id))
    .sort((a,b) => (a.codigo||a.descricao).localeCompare(b.codigo||b.descricao, 'pt-BR'));

  // máquinas da obra com dias retroativos faltando (mesma janela do operador)
  const atrasadasObra = maquinas
    .filter(m => m.ativa && (m.obra || 'Sem obra') === obra)
    .map(m => ({ maquina: m, dias: diasPendentesMaquina(m, registros) }))
    .filter(x => x.dias.length > 0)
    .sort((a,b) => (a.maquina.codigo||a.maquina.descricao).localeCompare(b.maquina.codigo||b.maquina.descricao, 'pt-BR'));

  async function validar(r) {
    setProcessando(r.id);
    await onValidar(r, 'validada', '');
    setProcessando(null);
  }
  async function confirmarInvalidar(r) {
    if (!motivo.trim()) return;
    setProcessando(r.id);
    await onValidar(r, 'invalidada', motivo.trim());
    setInvalidando(null); setMotivo(''); setProcessando(null);
  }

  return (
    <div style={{maxWidth:620, margin:'0 auto'}}>
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:18}}>
        <button onClick={onVoltar} style={{...S.botaoSec, padding:10, borderRadius:10}} aria-label="Voltar"><ArrowLeft size={20}/></button>
        <div>
          <h2 style={{margin:0, fontSize:20, fontWeight:800, color:COR.azul}}>Validação</h2>
          <p style={{margin:'2px 0 0', color:COR.cinza, fontSize:13.5, display:'flex', alignItems:'center', gap:5}}><Building size={13}/> {obra}</p>
        </div>
      </div>

      {/* SEÇÃO 1 — Pendentes de validação */}
      <div style={{display:'flex', alignItems:'center', gap:8, margin:'0 2px 10px'}}>
        <Clock size={16} color={COR.amarelo}/>
        <span style={{fontSize:14.5, fontWeight:800, color:COR.texto}}>Pendentes de validação</span>
        <span style={{fontSize:12.5, fontWeight:700, color:'#92400E', background:'#FDE68A', padding:'1px 9px', borderRadius:999}}>{pendentes.length}</span>
      </div>

      {pendentes.length === 0 ? (
        <div style={{...S.card, textAlign:'center', padding:'22px 16px', color:COR.cinza, marginBottom:24}}>
          <CheckCircle2 size={32} color={COR.verde}/>
          <p style={{marginTop:8, fontWeight:600, fontSize:14}}>Nada pendente de validação.</p>
        </div>
      ) : (
        <div style={{display:'flex', flexDirection:'column', gap:10, marginBottom:24}}>
          {pendentes.map(r => {
            const aberto = expandido === r.id;
            const func = r.status === 'funcional';
            const maq = mapaMaq[r.maquinaId];
            return (
              <div key={r.id} style={{...S.card, padding:0, overflow:'hidden'}}>
                <div onClick={() => setExpandido(aberto?null:r.id)} style={{display:'flex', alignItems:'center', gap:12, padding:'13px 16px', cursor:'pointer'}}>
                  <div style={{width:40, height:40, borderRadius:10, background: r.status==='sem_atividade'?'#F1F5F9':(func?COR.verdeBg:COR.vermelhoBg), display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                    {r.status==='sem_atividade' ? <CircleSlash size={20} color="#64748B"/> : (func ? <CheckCircle2 size={20} color={COR.verde}/> : <AlertTriangle size={20} color={COR.vermelho}/>)}
                  </div>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontSize:15, fontWeight:700, color:COR.texto}}>{r.maquinaCodigo ? r.maquinaCodigo+' · ' : ''}{r.maquinaDescricao}</div>
                    <div style={{fontSize:12.5, color:COR.cinza, marginTop:1}}>{r.retroativo ? `Ref. ${(r.dataRef||'').split('-').reverse().slice(0,2).join('/')} (retroativo)` : dataHoraBR(r.criadoEm)} · {r.operador || 'sem nome'}</div>
                  </div>
                  <BadgeStatusReg registro={r}/>
                  <ChevronDown size={18} color={COR.cinza} style={{transform: aberto?'rotate(180deg)':'none', transition:'transform .15s', flexShrink:0}}/>
                </div>

                {aberto && (
                  <div style={{borderTop:`1px solid ${COR.borda}`, padding:'14px 16px', background:'#FAFBFC'}}>
                    <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(130px,1fr))', gap:8, marginBottom:12, fontSize:13}}>
                      {func && <div><b>Medidor:</b> {r.horimetroNA ? 'N/A' : (r.horimetro!=null ? r.horimetro+(maq&&maq.unidade==='km'?'km':'h') : '—')}</div>}
                      <div><b>Status:</b> {func ? 'Funcional' : 'Não funcional'}</div>
                      {!func && <div><b>Motivo:</b> {r.motivoParada || '—'}</div>}
                    </div>
                    {r.observacao && <div style={{fontSize:13.5, marginBottom:10}}><b>Obs:</b> {r.observacao}</div>}
                    {r.fotoUrl && <a href={r.fotoUrl} target="_blank" rel="noopener"><img src={r.fotoUrl} alt="painel" style={{width:90, height:90, objectFit:'cover', borderRadius:8, border:`1px solid ${COR.borda}`, marginBottom:10}}/></a>}

                    {invalidando === r.id ? (
                      <div style={{marginTop:6}}>
                        <label style={S.rotulo}>Motivo da invalidação</label>
                        <textarea value={motivo} rows={2} placeholder="Descreva o que está errado…" style={{...S.campo, resize:'vertical'}} onChange={e => setMotivo(e.target.value)} autoFocus/>
                        <div style={{display:'flex', gap:8, marginTop:8}}>
                          <button onClick={() => confirmarInvalidar(r)} disabled={!motivo.trim() || processando===r.id} style={{...S.botaoPrim, flex:1, background:COR.vermelho, opacity:(!motivo.trim()||processando===r.id)?.6:1}}>Confirmar invalidação</button>
                          <button onClick={() => { setInvalidando(null); setMotivo(''); }} style={S.botaoSec}>Cancelar</button>
                        </div>
                      </div>
                    ) : (
                      <div style={{display:'flex', gap:10, marginTop:6}}>
                        <button onClick={() => validar(r)} disabled={processando===r.id} style={{...S.botaoPrim, flex:1, background:COR.verde, opacity:processando===r.id?.7:1}}><CheckCircle2 size={17}/> Validar</button>
                        <button onClick={() => { setInvalidando(r.id); setMotivo(''); }} style={{...S.botaoSec, color:COR.vermelho, borderColor:'#FECACA'}}><X size={17}/> Invalidar</button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* SEÇÃO 2 — Máquinas sem checklist hoje */}
      <div style={{display:'flex', alignItems:'center', gap:8, margin:'0 2px 10px'}}>
        <AlertTriangle size={16} color={COR.vermelho}/>
        <span style={{fontSize:14.5, fontWeight:800, color:COR.texto}}>Sem checklist hoje</span>
        <span style={{fontSize:12.5, fontWeight:700, color:'#991B1B', background:COR.vermelhoBg, padding:'1px 9px', borderRadius:999}}>{semChecklistHoje.length}</span>
      </div>

      {semChecklistHoje.length === 0 ? (
        <div style={{...S.card, textAlign:'center', padding:'22px 16px', color:COR.cinza}}>
          <CheckCircle2 size={32} color={COR.verde}/>
          <p style={{marginTop:8, fontWeight:600, fontSize:14}}>Todas as máquinas fizeram o checklist hoje.</p>
        </div>
      ) : (
        <div style={{display:'flex', flexDirection:'column', gap:8}}>
          {semChecklistHoje.map(m => (
            <div key={m.id} style={{...S.card, display:'flex', alignItems:'center', gap:12, padding:'12px 16px'}}>
              <div style={{width:40, height:40, borderRadius:10, background:COR.vermelhoBg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                <CircleSlash size={20} color={COR.vermelho}/>
              </div>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:15, fontWeight:700, color:COR.texto}}>{m.codigo ? m.codigo+' · ' : ''}{m.descricao}</div>
                <div style={{fontSize:12.5, color:COR.cinza, marginTop:1}}>Aguardando checklist do dia</div>
              </div>
              <Badge cor={COR.vermelho} bg={COR.vermelhoBg}>Pendente</Badge>
            </div>
          ))}
        </div>
      )}

      {/* SEÇÃO 3 — Dias atrasados (retroativos) */}
      <div style={{display:'flex', alignItems:'center', gap:8, margin:'24px 2px 10px'}}>
        <Clock size={16} color={COR.amarelo}/>
        <span style={{fontSize:14.5, fontWeight:800, color:COR.texto}}>Dias atrasados</span>
        <span style={{fontSize:12.5, fontWeight:700, color:'#92400E', background:'#FDE68A', padding:'1px 9px', borderRadius:999}}>{atrasadasObra.length}</span>
      </div>

      {atrasadasObra.length === 0 ? (
        <div style={{...S.card, textAlign:'center', padding:'22px 16px', color:COR.cinza}}>
          <CheckCircle2 size={32} color={COR.verde}/>
          <p style={{marginTop:8, fontWeight:600, fontSize:14}}>Nenhum dia atrasado pendente.</p>
        </div>
      ) : (
        <div style={{display:'flex', flexDirection:'column', gap:8}}>
          {atrasadasObra.map(({ maquina, dias }) => (
            <div key={maquina.id} style={{...S.card, padding:'12px 16px'}}>
              <div style={{display:'flex', alignItems:'center', gap:12}}>
                <div style={{width:40, height:40, borderRadius:10, background:COR.amareloBg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                  <Clock size={20} color={COR.amarelo}/>
                </div>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:15, fontWeight:700, color:COR.texto}}>{maquina.codigo ? maquina.codigo+' · ' : ''}{maquina.descricao}</div>
                  <div style={{fontSize:12, color:COR.cinza, marginTop:2}}>
                    {dias.slice(0,12).map(d => d.split('-').reverse().slice(0,2).join('/')).join(', ')}{dias.length > 12 ? '…' : ''}
                  </div>
                </div>
                <span style={{fontSize:12.5, fontWeight:800, color:'#92400E', background:'#FDE68A', padding:'2px 9px', borderRadius:999, whiteSpace:'nowrap'}}>{dias.length} dia(s)</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// APP RAIZ
// ============================================================
function App() {
  const [modo, setModo] = useState('inicial');     // 'inicial' | 'operador' | 'admin'
  const [logado, setLogado] = useState(false);      // login do admin
  const [logadoValidador, setLogadoValidador] = useState(false);
  const [valObra, setValObra] = useState(null);
  const [valTela, setValTela] = useState('validar'); // 'validar' | 'relatorios'
  const [maquinas, setMaquinas] = useState([]);
  const [obras, setObras] = useState([]);
  const [registros, setRegistros] = useState([]);
  const [checklistItens, setChecklistItens] = useState(CHECKLIST_PADRAO);
  const [carregando, setCarregando] = useState(true);
  const [tela, setTela] = useState('lista');      // admin: 'lista' | 'form'
  const [editando, setEditando] = useState(null);  // máquina em edição
  const [showObras, setShowObras] = useState(false);
  const [showChecklist, setShowChecklist] = useState(false);
  const [toast, setToast] = useState('');

  // Fluxo operador: 'maquina' (escolhe) | 'registra' | 'sucesso'
  const [opPasso, setOpPasso] = useState('obra');
  const [opObra, setOpObra] = useState(null);
  const [opMaquina, setOpMaquina] = useState(null);
  const [opDataRef, setOpDataRef] = useState(null); // null = hoje; 'YYYY-MM-DD' = retroativo
  const [opComplemento, setOpComplemento] = useState(false); // true = complemento de fim de dia
  const [meusRegistros, setMeusRegistros] = useState(() => meusRegistrosHoje());
  const [opSalvando, setOpSalvando] = useState(false);
  const [opResultado, setOpResultado] = useState(null);
  const [filaPendentes, setFilaPendentes] = useState(0);
  const [online, setOnline] = useState(typeof navigator !== 'undefined' ? navigator.onLine : true);
  const [sincronizando, setSincronizando] = useState(false);

  function aviso(msg) { setToast(msg); setTimeout(() => setToast(''), 2600); }

  // Sincroniza a fila offline e atualiza o contador
  async function tentarSincronizar() {
    setSincronizando(true);
    try {
      const r = await sincronizarFila();
      setFilaPendentes(r.restantes);
      if (r.enviados > 0) { aviso(`${r.enviados} registro(s) sincronizado(s).`); recarregar(); }
    } catch (e) { console.error(e); }
    finally { setSincronizando(false); }
  }

  // Monitora conexão e sincroniza ao voltar online
  useEffect(() => {
    filaContar().then(setFilaPendentes);
    // pré-carrega o cache offline (máquinas/obras/checklist) ao abrir com internet
    if (navigator.onLine && supabaseClient) {
      listarMaquinas(); listarObras(); lerChecklistConfig();
    }
    function aoOnline() { setOnline(true); tentarSincronizar(); }
    function aoOffline() { setOnline(false); }
    window.addEventListener('online', aoOnline);
    window.addEventListener('offline', aoOffline);
    const onFila = (e) => setFilaPendentes(e.detail.restantes);
    window.addEventListener('fila-mudou', onFila);
    // tenta sincronizar ao abrir, se houver pendências e estiver online
    if (navigator.onLine) tentarSincronizar();
    return () => {
      window.removeEventListener('online', aoOnline);
      window.removeEventListener('offline', aoOffline);
      window.removeEventListener('fila-mudou', onFila);
    };
  }, []);

  async function recarregar() {
    const [ms, os, rs, ci] = await Promise.all([listarMaquinas(), listarObras(), listarRegistros(), lerChecklistConfig()]);
    setMaquinas(ms); setObras(os); setRegistros(rs); setChecklistItens(ci); setCarregando(false);
  }

  // Carrega dados quando entra em operador ou admin
  const ativo = modo === 'operador' || (modo === 'validador' && logadoValidador) || (modo === 'admin' && logado);
  useEffect(() => {
    if (!ativo) return;
    let canal;
    (async () => {
      setCarregando(true);
      if (navigator.onLine && supabaseClient) {
        try { await semearSeVazio(); await semearChecklistSeVazio(); } catch (e) { console.warn('semear', e); }
      }
      await recarregar();
      if (supabaseClient && navigator.onLine) {
        canal = supabaseClient.channel('frota')
          .on('postgres_changes', { event:'*', schema:'public', table:'maquinas' }, recarregar)
          .on('postgres_changes', { event:'*', schema:'public', table:'obras' }, recarregar)
          .on('postgres_changes', { event:'*', schema:'public', table:'registros' }, recarregar)
          .on('postgres_changes', { event:'*', schema:'public', table:'configuracoes' }, recarregar)
          .subscribe();
      }
    })();
    return () => { if (canal) supabaseClient.removeChannel(canal); };
  }, [ativo]);

  // Último status de cada máquina (a partir dos registros, já ordenados desc)
  const ultimoStatus = {};
  const ultimoRegistroNaoFunc = {}; // máquina -> registro de parada em aberto
  for (const r of registros) {
    if (ultimoStatus[r.maquinaId] === undefined) {
      ultimoStatus[r.maquinaId] = r.status;
      if (r.status === 'nao_funcional') ultimoRegistroNaoFunc[r.maquinaId] = r;
    }
  }

  // --- CRUD máquinas ---
  async function salvarMaquina(dados) {
    if (!supabaseClient) return;
    const payload = maquinaParaBanco(dados);
    if (dados.id) {
      await supabaseClient.from('maquinas').update(payload).eq('id', dados.id);
      aviso('Máquina atualizada.');
    } else {
      await supabaseClient.from('maquinas').insert(payload);
      aviso('Máquina cadastrada.');
    }
    setTela('lista'); setEditando(null);
    recarregar();
  }
  async function toggleAtiva(m) {
    if (!supabaseClient) return;
    await supabaseClient.from('maquinas').update({ ativa: !m.ativa }).eq('id', m.id);
    aviso(m.ativa ? 'Máquina inativada.' : 'Máquina reativada.');
    recarregar();
  }

  // --- Registro do operador ---
  async function salvarRegistro(dados) {
    if (!opMaquina) return;
    setOpSalvando(true);
    const ehRetro = !!opDataRef;
    const ehComp = !!opComplemento;
    // retroativo: grava com a data do dia (meio-dia, evita troca de fuso); senão agora
    const criadoEm = ehRetro ? new Date(opDataRef + 'T12:00:00').toISOString() : new Date().toISOString();

    // indisponibilidade (só no fluxo normal; não calcula em retroativo)
    const paradaAberta = ehRetro ? null : (ultimoRegistroNaoFunc[opMaquina.id] || null);
    let indisponivelMin = null, fimParadaDe = null;
    if (dados.status === 'funcional' && paradaAberta) {
      indisponivelMin = Math.max(0, Math.round((Date.now() - new Date(paradaAberta.criadoEm).getTime()) / 60000));
      fimParadaDe = paradaAberta.id;
    }

    // linha base (sem fotos — as URLs entram no envio)
    const linhaBase = {
      maquina_id: opMaquina.id,
      maquina_codigo: opMaquina.codigo,
      maquina_descricao: opMaquina.descricao,
      obra: opMaquina.obra,
      operador: dados.operador,
      status: dados.status,
      horimetro: dados.horimetro,
      horimetro_na: dados.horimetroNA,
      motivo_parada: dados.motivo,
      observacao: dados.observacao,
      fim_parada_de: fimParadaDe,
      indisponivel_minutos: indisponivelMin,
      checklist: dados.checklist || [],
      retroativo: ehRetro,
      data_ref: ehRetro ? opDataRef : null,
      complemento: ehComp,
      criado_em: criadoEm,
    };
    // retroativo não mexe na máquina; complemento atualiza só o status (não o horímetro,
    // pois a leitura da manhã continua sendo a base de cálculo)
    let maquinaUpdate = null;
    if (!ehRetro) {
      maquinaUpdate = { status_atual: dados.status };
      if (!ehComp && dados.status === 'funcional' && dados.horimetro != null) maquinaUpdate.horimetro_atual = dados.horimetro;
    }

    const estaOnline = navigator.onLine && supabaseClient;

    try {
      if (estaOnline) {
        // ---- CAMINHO ONLINE: envia direto ----
        let fotoUrl = '';
        if (dados.foto) fotoUrl = await enviarFoto(dados.foto);
        const fotosExtrasUrls = [];
        for (const f of (dados.fotosExtras || [])) {
          try { const u = await enviarFoto(f); if (u) fotosExtrasUrls.push(u); } catch (e) { console.error('foto extra', e); }
        }
        const linha = { ...linhaBase, foto_url: fotoUrl, fotos_extras: fotosExtrasUrls };
        const { error } = await supabaseClient.from('registros').insert(linha);
        if (error) throw error;
        if (maquinaUpdate) await supabaseClient.from('maquinas').update(maquinaUpdate).eq('id', opMaquina.id);

        const regCompleto = { ...registroDoBanco(linha), fotoUrl, fotosExtras: fotosExtrasUrls };
        adicionarMeuRegistro({ registro: regCompleto, maquina: { id: opMaquina.id, codigo: opMaquina.codigo, descricao: opMaquina.descricao, obra: opMaquina.obra, unidade: opMaquina.unidade, possuiHorimetro: opMaquina.possuiHorimetro, tipo: opMaquina.tipo } });
        setMeusRegistros(meusRegistrosHoje());
        setOpResultado({
          maquina: `${opMaquina.codigo ? opMaquina.codigo + ' · ' : ''}${opMaquina.descricao}`,
          indisponivelMinutos: indisponivelMin, registro: regCompleto, maquinaObj: opMaquina, offline: false,
        });
        setOpPasso('sucesso');
        recarregar();
      } else {
        // ---- CAMINHO OFFLINE: guarda na fila local ----
        const item = {
          id: 'fila_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
          linha: linhaBase,
          maquinaId: opMaquina.id,
          maquinaUpdate,
          fotoBlob: dados.foto || null,            // File é um Blob — IndexedDB guarda direto
          fotosExtrasBlobs: dados.fotosExtras || [],
        };
        await filaAdicionar(item);
        const n = await filaContar();
        setFilaPendentes(n);
        // registro p/ PDF local (usa as fotos como objeto URL temporário)
        const regCompleto = {
          ...registroDoBanco({ ...linhaBase, foto_url:'', fotos_extras:[] }),
          fotoUrl: dados.foto ? URL.createObjectURL(dados.foto) : '',
          fotosExtras: (dados.fotosExtras || []).map(f => URL.createObjectURL(f)),
        };
        setOpResultado({
          maquina: `${opMaquina.codigo ? opMaquina.codigo + ' · ' : ''}${opMaquina.descricao}`,
          indisponivelMinutos: indisponivelMin, registro: regCompleto, maquinaObj: opMaquina, offline: true,
        });
        setOpPasso('sucesso');
      }
    } catch (e) {
      console.error('salvarRegistro', e);
      // se falhou online (rede caiu no meio), tenta guardar offline como segurança
      try {
        const item = {
          id: 'fila_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
          linha: linhaBase, maquinaId: opMaquina.id, maquinaUpdate,
          fotoBlob: dados.foto || null, fotosExtrasBlobs: dados.fotosExtras || [],
        };
        await filaAdicionar(item);
        setFilaPendentes(await filaContar());
        setOpResultado({
          maquina: `${opMaquina.codigo ? opMaquina.codigo + ' · ' : ''}${opMaquina.descricao}`,
          indisponivelMinutos: indisponivelMin, registro: null, maquinaObj: opMaquina, offline: true,
        });
        setOpPasso('sucesso');
      } catch (e2) {
        alert('Não foi possível salvar o registro.\n\n' + (e.message || ''));
      }
    } finally {
      setOpSalvando(false);
    }
  }

  function reiniciarOperador() {
    setOpMaquina(null); setOpObra(null); setOpResultado(null); setOpDataRef(null); setOpPasso('obra');
  }
  function sairParaInicio() {
    reiniciarOperador(); setModo('inicial');
  }

  // --- Validação (validador) ---
  async function validarRegistro(reg, status, motivo) {
    if (!supabaseClient) return;
    await supabaseClient.from('registros').update({
      validacao_status: status,
      validacao_por: 'Validador',
      validacao_em: new Date().toISOString(),
      validacao_motivo: status === 'invalidada' ? motivo : null,
    }).eq('id', reg.id);
    aviso(status === 'validada' ? 'Registro validado.' : 'Registro invalidado.');
    recarregar();
  }
  function sairValidador() {
    setLogadoValidador(false); setValObra(null); setModo('inicial');
  }

  // --- Ajuste manual do admin (editar/criar status de um dia) ---
  async function salvarAjusteRegistro(ctx, dados) {
    if (!supabaseClient) return;
    const agora = new Date().toISOString();
    if (ctx.registro && ctx.registro.id) {
      // edita registro existente
      await supabaseClient.from('registros').update({
        status: dados.status,
        motivo_parada: dados.status === 'nao_funcional' ? dados.motivo : null,
        observacao: dados.observacao || null,
        ajuste_admin: true,
        ajuste_admin_em: agora,
      }).eq('id', ctx.registro.id);
      aviso('Status atualizado.');
    } else {
      // cria registro do zero para o dia (sem leitura de horímetro)
      const m = ctx.maquina;
      await supabaseClient.from('registros').insert({
        maquina_id: m.id,
        maquina_codigo: m.codigo,
        maquina_descricao: m.descricao,
        obra: m.obra,
        operador: 'Administrador',
        status: dados.status,
        horimetro: null,
        horimetro_na: true,
        motivo_parada: dados.status === 'nao_funcional' ? dados.motivo : null,
        observacao: dados.observacao || null,
        checklist: [],
        retroativo: true,
        data_ref: ctx.data,
        ajuste_admin: true,
        ajuste_admin_em: agora,
        criado_em: new Date(ctx.data + 'T12:00:00').toISOString(),
      });
      aviso('Status lançado.');
    }
    recarregar();
  }

  // --- Configuração do checklist (admin) ---
  async function salvarChecklist(itens) {
    await salvarChecklistConfig(itens);
    setChecklistItens(itens);
    setShowChecklist(false);
    aviso('Checklist atualizado.');
    recarregar();
  }

  // Salva o checklist próprio de uma máquina (lista = null volta ao padrão)
  async function salvarChecklistMaquina(maquina, lista) {
    if (!supabaseClient) return;
    await supabaseClient.from('maquinas')
      .update({ checklist_itens: (lista && lista.length) ? lista : null })
      .eq('id', maquina.id);
    aviso('Checklist da máquina salvo.');
    recarregar();
  }

  // --- CRUD obras ---
  async function criarObra(nome) {
    if (!supabaseClient) return;
    await supabaseClient.from('obras').insert({ nome, ativa:true });
    recarregar();
  }
  async function renomearObra(id, nome) {
    if (!nome || !supabaseClient) return;
    await supabaseClient.from('obras').update({ nome }).eq('id', id);
    recarregar();
  }
  async function excluirObra(o) {
    if (!supabaseClient) return;
    const emUso = maquinas.filter(m => m.obra === o.nome).length;
    const msg = emUso
      ? `A obra "${o.nome}" está vinculada a ${emUso} máquina(s). Excluir mesmo assim? As máquinas ficarão sem obra.`
      : `Excluir a obra "${o.nome}"?`;
    if (!window.confirm(msg)) return;
    await supabaseClient.from('obras').delete().eq('id', o.id);
    recarregar();
  }

  // ---------- MODO INICIAL ----------
  const bannerProps = { online, pendentes: filaPendentes, sincronizando, onSincronizar: tentarSincronizar };

  if (modo === 'inicial') {
    return (
      <>
        <BannerStatus {...bannerProps} />
        <TelaInicial
          onOperador={() => { reiniciarOperador(); setModo('operador'); }}
          onValidador={() => setModo('validador')}
          onAdmin={() => setModo('admin')}
          meusRegistros={meusRegistros}
          onBaixarPdf={(item) => gerarPdfRegistro(item.registro, item.maquina)}
        />
      </>
    );
  }

  // ---------- MODO VALIDADOR ----------
  if (modo === 'validador') {
    if (!logadoValidador) return <LoginValidador onEntrar={() => setLogadoValidador(true)} onVoltar={() => setModo('inicial')} />;
    return (
      <div style={{minHeight:'100vh', background:COR.bg}}>
        <BannerStatus {...bannerProps} />
        <header style={{background:COR.verde, color:'#fff', padding:'14px 20px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <div style={{width:34, height:34, borderRadius:9, background:'rgba(255,255,255,.2)', display:'flex', alignItems:'center', justifyContent:'center'}}><CheckCircle2 size={20} color="#fff"/></div>
            <div>
              <div style={{fontWeight:800, fontSize:16, lineHeight:1}}>Validação</div>
              <div style={{fontSize:11.5, opacity:.8}}>Validador</div>
            </div>
          </div>
          <div style={{display:'flex', gap:8}}>
            <button onClick={() => setValTela(valTela === 'relatorios' ? 'validar' : 'relatorios')} style={{background:'rgba(255,255,255,.2)', color:'#fff', border:'none', borderRadius:8, padding:'8px 12px', fontSize:13.5, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:6, fontFamily:'inherit'}}>
              {valTela === 'relatorios' ? <><CheckCircle2 size={16}/> Validação</> : <><BarChart3 size={16}/> Relatórios</>}
            </button>
            <button onClick={sairValidador} style={{background:'rgba(255,255,255,.2)', color:'#fff', border:'none', borderRadius:8, padding:'8px 12px', fontSize:13.5, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:6, fontFamily:'inherit'}}><LogOut size={16}/> Sair</button>
          </div>
        </header>
        <main style={{padding:'24px 16px 60px'}}>
          {carregando ? (
            <p style={{textAlign:'center', color:COR.cinza, padding:'40px 0'}}>Carregando…</p>
          ) : valTela === 'relatorios' ? (
            <TelaRelatorios registros={registros} maquinas={maquinas} onVoltar={() => setValTela('validar')} onSalvarAjuste={salvarAjusteRegistro} />
          ) : !valObra ? (
            <ValidadorSelecionaObra maquinas={maquinas} registros={registros} onEscolher={setValObra} onVoltar={sairValidador} />
          ) : (
            <ValidadorRegistros obra={valObra} registros={registros} maquinas={maquinas} onValidar={validarRegistro} onVoltar={() => setValObra(null)} />
          )}
        </main>
      </div>
    );
  }

  // ---------- MODO OPERADOR ----------
  if (modo === 'operador') {
    return (
      <div style={{minHeight:'100vh', background:COR.bg}}>
        <BannerStatus {...bannerProps} />
        <header style={{background:COR.azul, color:'#fff', padding:'14px 20px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <div style={{width:34, height:34, borderRadius:9, background:'rgba(255,255,255,.15)', display:'flex', alignItems:'center', justifyContent:'center'}}><User size={20} color="#fff"/></div>
            <div>
              <div style={{fontWeight:800, fontSize:16, lineHeight:1}}>Registro de Máquina</div>
              <div style={{fontSize:11.5, opacity:.7}}>Operador</div>
            </div>
          </div>
          <button onClick={sairParaInicio} style={{background:'rgba(255,255,255,.12)', color:'#fff', border:'none', borderRadius:8, padding:'8px 12px', fontSize:13.5, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:6, fontFamily:'inherit'}}><LogOut size={16}/> Sair</button>
        </header>
        <main style={{padding:'24px 16px 60px'}}>
          {carregando ? (
            <p style={{textAlign:'center', color:COR.cinza, padding:'40px 0'}}>Carregando máquinas…</p>
          ) : opPasso === 'obra' ? (
            <OperadorSelecionaObra
              obras={obras} maquinas={maquinas}
              onEscolher={(nome) => { setOpObra(nome); setOpPasso('maquina'); }}
              onVoltar={sairParaInicio}
            />
          ) : opPasso === 'maquina' ? (
            <OperadorSelecionaMaquina
              maquinas={maquinas} obra={opObra} ultimoStatus={ultimoStatus} registros={registros}
              onEscolher={(m) => {
                setOpMaquina(m); setOpDataRef(null); setOpComplemento(false);
                const hoje = new Date().toISOString().slice(0,10);
                const fezHoje = registros.some(r => r.maquinaId === m.id && !r.retroativo && new Date(r.criadoEm).toISOString().slice(0,10) === hoje);
                const pend = online ? diasPendentesMaquina(m, registros) : [];
                // mostra a tela de escolha se há dias atrasados OU se já fez o de hoje (oferece complemento)
                if (pend.length > 0 || fezHoje) setOpPasso('data');
                else setOpPasso('registra');
              }}
              onVoltar={() => { setOpObra(null); setOpPasso('obra'); }}
            />
          ) : opPasso === 'data' ? (
            <OperadorEscolheData
              maquina={opMaquina}
              diasPendentes={diasPendentesMaquina(opMaquina, registros)}
              jaFezHoje={registros.some(r => r.maquinaId === opMaquina.id && !r.retroativo && new Date(r.criadoEm).toISOString().slice(0,10) === new Date().toISOString().slice(0,10))}
              onEscolher={(iso) => { setOpDataRef(iso); setOpComplemento(false); setOpPasso('registra'); }}
              onComplemento={() => { setOpDataRef(null); setOpComplemento(true); setOpPasso('registra'); }}
              onVoltar={() => { setOpMaquina(null); setOpDataRef(null); setOpComplemento(false); setOpPasso('maquina'); }}
            />
          ) : opPasso === 'registra' ? (
            <OperadorRegistra
              maquina={opMaquina}
              paradaAberta={ultimoRegistroNaoFunc[opMaquina.id] || null}
              checklistItens={checklistDaMaquina(opMaquina, checklistItens)}
              salvando={opSalvando}
              dataRef={opDataRef}
              complemento={opComplemento}
              onConfirmar={salvarRegistro}
              onVoltar={() => {
                const pend = diasPendentesMaquina(opMaquina, registros);
                const hoje = new Date().toISOString().slice(0,10);
                const fezHoje = registros.some(r => r.maquinaId === opMaquina.id && !r.retroativo && new Date(r.criadoEm).toISOString().slice(0,10) === hoje);
                if (pend.length > 0 || fezHoje) setOpPasso('data');
                else { setOpMaquina(null); setOpPasso('maquina'); }
              }}
            />
          ) : (
            <OperadorSucesso info={opResultado} onNovo={reiniciarOperador} onSair={sairParaInicio} />
          )}
        </main>
      </div>
    );
  }

  // ---------- MODO ADMIN ----------
  if (!logado) return <LoginAdmin onEntrar={() => setLogado(true)} onVoltar={() => setModo('inicial')} />;

  return (
    <div style={{minHeight:'100vh', background:COR.bg}}>
      <BannerStatus {...bannerProps} />
      {/* Cabeçalho */}
      <header style={{background:COR.azul, color:'#fff', padding:'14px 20px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <div style={{width:34, height:34, borderRadius:9, background:'rgba(255,255,255,.15)', display:'flex', alignItems:'center', justifyContent:'center'}}>
            <Factory size={20} color="#fff"/>
          </div>
          <div>
            <div style={{fontWeight:800, fontSize:16, lineHeight:1}}>Gestão de Frota</div>
            <div style={{fontSize:11.5, opacity:.7}}>Construtora Axial</div>
          </div>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          <button onClick={() => setTela(tela === 'registros' ? 'lista' : 'registros')} style={{background:'rgba(255,255,255,.12)', color:'#fff', border:'none', borderRadius:8, padding:'8px 12px', fontSize:13.5, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:6, fontFamily:'inherit'}}>
            <FileText size={16}/> Registros
          </button>
          <button onClick={() => setTela(tela === 'relatorios' ? 'lista' : 'relatorios')} style={{background:'rgba(255,255,255,.12)', color:'#fff', border:'none', borderRadius:8, padding:'8px 12px', fontSize:13.5, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:6, fontFamily:'inherit'}}>
            <BarChart3 size={16}/> Relatórios
          </button>
          <button onClick={() => setShowChecklist(true)} style={{background:'rgba(255,255,255,.12)', color:'#fff', border:'none', borderRadius:8, padding:'8px 12px', fontSize:13.5, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:6, fontFamily:'inherit'}}>
            <List size={16}/> Checklist padrão
          </button>
          <button onClick={() => setTela(tela === 'checklist_maquina' ? 'lista' : 'checklist_maquina')} style={{background:'rgba(255,255,255,.12)', color:'#fff', border:'none', borderRadius:8, padding:'8px 12px', fontSize:13.5, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:6, fontFamily:'inherit'}}>
            <Factory size={16}/> Checklist/máq.
          </button>
          <button onClick={() => { setLogado(false); setModo('inicial'); setTela('lista'); }} style={{background:'rgba(255,255,255,.12)', color:'#fff', border:'none', borderRadius:8, padding:'8px 12px', fontSize:13.5, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:6, fontFamily:'inherit'}}>
            <LogOut size={16}/> Sair
          </button>
        </div>
      </header>

      <main style={{padding:'24px 16px 60px'}}>
        {tela === 'lista' && (
          <TelaMaquinas
            maquinas={maquinas} obras={obras} carregando={carregando}
            onNova={() => { setEditando(null); setTela('form'); }}
            onEditar={(m) => { setEditando(m); setTela('form'); }}
            onToggleAtiva={toggleAtiva}
            onAbrirObras={() => setShowObras(true)}
          />
        )}
        {tela === 'form' && (
          <FormMaquina
            maquina={editando} obras={obras}
            onSalvar={salvarMaquina}
            onCancelar={() => { setTela('lista'); setEditando(null); }}
          />
        )}
        {tela === 'relatorios' && (
          <TelaRelatorios
            registros={registros} maquinas={maquinas}
            onVoltar={() => setTela('lista')}
            onSalvarAjuste={salvarAjusteRegistro}
          />
        )}
        {tela === 'registros' && (
          <TelaRegistros
            registros={registros} maquinas={maquinas}
            onVoltar={() => setTela('lista')}
            onSalvarAjuste={salvarAjusteRegistro}
            onExcluirPeriodo={async (ini, fim, obra) => {
              const r = await excluirRegistrosPeriodo(registros, ini, fim, obra);
              await recarregar();
              return r;
            }}
          />
        )}
        {tela === 'checklist_maquina' && (
          <TelaChecklistMaquinas
            maquinas={maquinas} padrao={checklistItens}
            onVoltar={() => setTela('lista')}
            onSalvarMaquina={salvarChecklistMaquina}
          />
        )}
      </main>

      {showObras && (
        <GestaoObras obras={obras} onCriar={criarObra} onRenomear={renomearObra} onExcluir={excluirObra} onFechar={() => setShowObras(false)} />
      )}

      {showChecklist && (
        <ConfigChecklist itens={checklistItens} onSalvar={salvarChecklist} onFechar={() => setShowChecklist(false)} />
      )}

      {toast && (
        <div style={{position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)', background:COR.azul, color:'#fff', padding:'12px 22px', borderRadius:999, fontSize:14, fontWeight:600, boxShadow:'0 8px 24px rgba(0,0,0,.2)', zIndex:600, display:'flex', alignItems:'center', gap:8}}>
          <CheckCircle2 size={18}/> {toast}
        </div>
      )}
    </div>
  );
}

const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(<App />);
  </script>
</body>
</html>
