// --- Operador: passo 1, escolher a máquina ---
// --- Operador: passo 1, escolher a OBRA ---
function OperadorSelecionaObra({ obras, maquinas, onEscolher, onVoltar }) {
  const ativas = maquinas.filter(m => m.ativa);
  // conta máquinas por obra (apenas obras com máquina ativa entram)
  const contagem = {};
  for (const m of ativas) {
    const nome = m.obra || 'Sem obra';
    contagem[nome] = (contagem[nome] || 0) + 1;
  }
  const nomesObras = Object.keys(contagem).sort((a, b) => a.localeCompare(b, 'pt-BR'));

  return (
    <div style={{maxWidth:560, margin:'0 auto'}}>
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:18}}>
        <button onClick={onVoltar} style={{...S.botaoSec, padding:10, borderRadius:10}} aria-label="Voltar"><ArrowLeft size={20}/></button>
        <div>
          <h2 style={{margin:0, fontSize:22, fontWeight:800, color:COR.azul}}>Selecione a obra</h2>
          <p style={{margin:'2px 0 0', color:COR.cinza, fontSize:13.5}}>{nomesObras.length} obra(s) com máquinas</p>
        </div>
      </div>

      <div style={{display:'flex', flexDirection:'column', gap:10}}>
        {nomesObras.map(nome => (
          <button key={nome} onClick={() => onEscolher(nome)} style={{display:'flex', alignItems:'center', gap:12, background:'#fff', border:`1.5px solid ${COR.borda}`, borderRadius:14, padding:'16px', cursor:'pointer', fontFamily:'inherit', textAlign:'left', width:'100%'}}>
            <div style={{width:42, height:42, borderRadius:11, background:'#EFF6FF', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
              <Building size={22} color={COR.azul}/>
            </div>
            <div style={{flex:1, minWidth:0}}>
              <div style={{fontSize:15.5, fontWeight:700, color:COR.texto}}>{nome}</div>
              <div style={{fontSize:12.5, color:COR.cinza, marginTop:2}}>{contagem[nome]} máquina(s)</div>
            </div>
            <ChevronRight size={20} color={COR.cinza}/>
          </button>
        ))}
        {nomesObras.length === 0 && <p style={{textAlign:'center', color:COR.cinza, padding:'30px 0'}}>Nenhuma máquina ativa cadastrada.</p>}
      </div>
    </div>
  );
}

// --- Operador: passo 2, escolher a MÁQUINA (da obra selecionada) ---
function OperadorSelecionaMaquina({ maquinas, obra, ultimoStatus, registros, onEscolher, onVoltar }) {
  const [busca, setBusca] = useState('');
  const ativas = maquinas.filter(m => m.ativa && (m.obra || 'Sem obra') === obra);
  const filtradas = ativas.filter(m => {
    if (!busca.trim()) return true;
    const q = busca.toLowerCase();
    return `${m.codigo} ${m.descricao} ${m.obra}`.toLowerCase().includes(q);
  });

  return (
    <div style={{maxWidth:560, margin:'0 auto'}}>
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:18}}>
        <button onClick={onVoltar} style={{...S.botaoSec, padding:10, borderRadius:10}} aria-label="Voltar"><ArrowLeft size={20}/></button>
        <div>
          <h2 style={{margin:0, fontSize:22, fontWeight:800, color:COR.azul}}>Selecione a máquina</h2>
          <p style={{margin:'2px 0 0', color:COR.cinza, fontSize:13.5, display:'flex', alignItems:'center', gap:5}}><Building size={13}/> {obra} · {ativas.length} máquina(s)</p>
        </div>
      </div>

      <div style={{position:'relative', marginBottom:16}}>
        <Search size={18} color={COR.cinza} style={{position:'absolute', left:13, top:'50%', transform:'translateY(-50%)'}}/>
        <input value={busca} placeholder="Buscar máquina…" style={{...S.campo, paddingLeft:42}} onChange={e => setBusca(e.target.value)}/>
      </div>

      <div style={{display:'flex', flexDirection:'column', gap:10}}>
        {filtradas.map(m => {
          const parada = ultimoStatus[m.id] === 'nao_funcional';
          const atrasados = diasPendentesMaquina(m, registros || []).length;
          return (
            <button key={m.id} onClick={() => onEscolher(m)} style={{display:'flex', alignItems:'center', gap:12, background:'#fff', border:`1.5px solid ${COR.borda}`, borderRadius:14, padding:'15px 16px', cursor:'pointer', fontFamily:'inherit', textAlign:'left', width:'100%'}}>
              <div style={{width:42, height:42, borderRadius:11, background: parada ? COR.vermelhoBg : '#EFF6FF', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                <Factory size={22} color={parada ? COR.vermelho : COR.azul}/>
              </div>
              <div style={{flex:1, minWidth:0}}>
                <div style={{display:'flex', alignItems:'center', gap:7}}>
                  {m.codigo && <span style={{fontSize:12, fontWeight:800, color:COR.azulCl}}>{m.codigo}</span>}
                  <span style={{fontSize:15.5, fontWeight:700, color:COR.texto}}>{m.descricao}</span>
                </div>
                <div style={{fontSize:12.5, color:COR.cinza, marginTop:2}}>{m.obra || 'Sem obra'}</div>
                {atrasados > 0 && (
                  <div style={{fontSize:12, color:COR.amarelo, marginTop:3, fontWeight:700, display:'flex', alignItems:'center', gap:4}}>
                    <Clock size={12}/> {atrasados} dia(s) atrasado(s)
                  </div>
                )}
              </div>
              <div style={{display:'flex', flexDirection:'column', gap:4, alignItems:'flex-end'}}>
                {parada && <Badge cor={COR.vermelho} bg={COR.vermelhoBg}><AlertTriangle size={11}/> Parada</Badge>}
                {atrasados > 0 && <span style={{fontSize:12, fontWeight:800, color:'#92400E', background:'#FDE68A', padding:'1px 9px', borderRadius:999}}>{atrasados}</span>}
                {!parada && atrasados === 0 && <ChevronRight size={20} color={COR.cinza}/>}
              </div>
            </button>
          );
        })}
        {filtradas.length === 0 && <p style={{textAlign:'center', color:COR.cinza, padding:'30px 0'}}>Nenhuma máquina encontrada.</p>}
      </div>
    </div>
  );
}

// --- Operador: escolher data (hoje / complemento / dia atrasado) ---
function OperadorEscolheData({ maquina, diasPendentes, jaFezHoje, onEscolher, onComplemento, onVoltar }) {
  function rotuloData(iso) {
    const [a,m,d] = iso.split('-');
    const dt = new Date(iso + 'T00:00:00');
    const semana = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][dt.getDay()];
    return `${d}/${m} · ${semana}`;
  }
  return (
    <div style={{maxWidth:480, margin:'0 auto'}}>
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:18}}>
        <button onClick={onVoltar} style={{...S.botaoSec, padding:10, borderRadius:10}} aria-label="Voltar"><ArrowLeft size={20}/></button>
        <div>
          <h2 style={{margin:0, fontSize:19, fontWeight:800, color:COR.azul}}>{maquina.codigo ? maquina.codigo+' · ' : ''}{maquina.descricao}</h2>
          <p style={{margin:'2px 0 0', color:COR.cinza, fontSize:13.5}}>Escolha o que deseja fazer.</p>
        </div>
      </div>

      {jaFezHoje ? (
        <button onClick={onComplemento} style={{display:'flex', alignItems:'center', gap:12, background:'#fff', border:`1.5px solid ${COR.azul}`, borderRadius:14, padding:'16px', cursor:'pointer', fontFamily:'inherit', textAlign:'left', width:'100%', marginBottom:16}}>
          <div style={{width:42, height:42, borderRadius:11, background:'#EFF6FF', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}><Clock size={22} color={COR.azul}/></div>
          <div style={{flex:1}}>
            <div style={{fontSize:15.5, fontWeight:800, color:COR.texto}}>Complemento de fim de dia</div>
            <div style={{fontSize:12.5, color:COR.cinza, marginTop:1}}>O checklist de hoje já foi feito. Registre a leitura do fim do dia ou uma parada.</div>
          </div>
          <ChevronRight size={20} color={COR.cinza}/>
        </button>
      ) : (
        <button onClick={() => onEscolher(null)} style={{display:'flex', alignItems:'center', gap:12, background:'#fff', border:`1.5px solid ${COR.azul}`, borderRadius:14, padding:'16px', cursor:'pointer', fontFamily:'inherit', textAlign:'left', width:'100%', marginBottom:16}}>
          <div style={{width:42, height:42, borderRadius:11, background:'#EFF6FF', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}><CheckCircle2 size={22} color={COR.azul}/></div>
          <div style={{flex:1}}>
            <div style={{fontSize:15.5, fontWeight:800, color:COR.texto}}>Checklist de hoje</div>
            <div style={{fontSize:12.5, color:COR.cinza, marginTop:1}}>Registro normal do dia atual</div>
          </div>
          <ChevronRight size={20} color={COR.cinza}/>
        </button>
      )}

      {diasPendentes.length > 0 && (
        <>
          <div style={{display:'flex', alignItems:'center', gap:8, margin:'0 2px 10px'}}>
            <Clock size={15} color={COR.amarelo}/>
            <span style={{fontSize:13.5, fontWeight:800, color:COR.texto}}>Dias atrasados</span>
          </div>
          <div style={{display:'flex', flexDirection:'column', gap:8}}>
            {diasPendentes.map(iso => (
              <button key={iso} onClick={() => onEscolher(iso)} style={{display:'flex', alignItems:'center', gap:12, background:'#fff', border:`1.5px solid ${COR.borda}`, borderRadius:14, padding:'14px 16px', cursor:'pointer', fontFamily:'inherit', textAlign:'left', width:'100%'}}>
                <div style={{width:38, height:38, borderRadius:10, background:COR.amareloBg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}><Clock size={19} color={COR.amarelo}/></div>
                <div style={{flex:1}}>
                  <div style={{fontSize:15, fontWeight:700, color:COR.texto}}>{rotuloData(iso)}</div>
                  <div style={{fontSize:12, color:COR.cinza, marginTop:1}}>Lançar em atraso</div>
                </div>
                <Badge cor={COR.amarelo} bg={COR.amareloBg}>Retroativo</Badge>
                <ChevronRight size={18} color={COR.cinza}/>
              </button>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// --- Operador: passo 2, registrar status ---
function OperadorRegistra({ maquina, paradaAberta, checklistItens, onConfirmar, onVoltar, salvando, dataRef, complemento }) {
  // paradaAberta = registro de não-funcional em aberto (ou null)
  const [operador, setOperador] = useState('');
  const [status, setStatus] = useState(null);     // 'funcional' | 'nao_funcional'
  const [horimetro, setHorimetro] = useState('');
  const [na, setNA] = useState(false);
  const [motivo, setMotivo] = useState('');
  const [obs, setObs] = useState('');
  const [foto, setFoto] = useState(null);
  const [fotoPreview, setFotoPreview] = useState('');
  const [erro, setErro] = useState('');
  // checklist: { [item]: { status:'ok'|'nok'|null, obs:'' } }
  const [check, setCheck] = useState({});
  // fotos extras: [{ file, preview }]
  const [extras, setExtras] = useState([]);

  const temHorimetro = maquina.possuiHorimetro;
  const exigeFoto = status === 'funcional' && temHorimetro && !na;

  async function escolherFoto(e) {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const comp = await comprimirImagem(f);
    setFoto(comp);
    setFotoPreview(URL.createObjectURL(comp));
  }

  async function addExtras(e) {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    const comps = [];
    for (const f of files) { const c = await comprimirImagem(f); comps.push({ file: c, preview: URL.createObjectURL(c) }); }
    setExtras(prev => [...prev, ...comps]);
    e.target.value = '';
  }
  function removerExtra(idx) {
    setExtras(prev => prev.filter((_, i) => i !== idx));
  }

  function setItem(item, campo, valor) {
    setCheck(prev => ({ ...prev, [item]: { ...(prev[item] || { status:null, obs:'' }), [campo]: valor } }));
  }

  function validarEConfirmar() {
    setErro('');
    if (!operador.trim()) { setErro('Informe seu nome.'); return; }
    if (!status) { setErro('Selecione o status da máquina.'); return; }
    if (status === 'funcional') {
      if (temHorimetro && !na) {
        if (horimetro === '' || isNaN(Number(horimetro))) { setErro('Informe o horímetro atual (ou marque "Não Aplicável").'); return; }
        if (!foto && !dataRef && !complemento) { setErro('A foto do painel é obrigatória para validar o horímetro.'); return; }
      }
    } else if (status === 'nao_funcional') {
      if (!motivo) { setErro('Selecione o motivo da parada.'); return; }
    }
    // "sem_atividade": não exige mais nada além do nome.
    const semAtiv = status === 'sem_atividade';
    // monta o checklist final (só itens respondidos) — vazio em sem_atividade
    const checklist = semAtiv ? [] : (checklistItens || []).map(item => ({
      item,
      status: (check[item] && check[item].status) || null,
      obs: (check[item] && check[item].obs) || '',
    }));
    onConfirmar({
      operador: operador.trim(),
      status,
      horimetro: (status === 'funcional' && temHorimetro && !na) ? Number(horimetro) : null,
      horimetroNA: status === 'funcional' && temHorimetro ? na : (semAtiv ? true : false),
      motivo: status === 'nao_funcional' ? motivo : '',
      observacao: obs.trim(),
      foto: semAtiv ? null : foto,
      checklist,
      fotosExtras: semAtiv ? [] : extras.map(x => x.file),
    });
  }

  return (
    <div style={{maxWidth:560, margin:'0 auto'}}>
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:18}}>
        <button onClick={onVoltar} style={{...S.botaoSec, padding:10, borderRadius:10}} aria-label="Voltar"><ArrowLeft size={20}/></button>
        <div>
          <h2 style={{margin:0, fontSize:20, fontWeight:800, color:COR.azul}}>{maquina.codigo ? maquina.codigo + ' · ' : ''}{maquina.descricao}</h2>
          <p style={{margin:'2px 0 0', color:COR.cinza, fontSize:13.5}}>{maquina.obra || 'Sem obra'}</p>
        </div>
      </div>

      {/* Aviso de checklist retroativo */}
      {dataRef && (
        <div style={{background:COR.amareloBg, border:`1px solid #FDE68A`, borderRadius:12, padding:'12px 14px', marginBottom:16, display:'flex', gap:10}}>
          <Clock size={18} color={COR.amarelo} style={{flexShrink:0, marginTop:1}}/>
          <div style={{fontSize:13.5, color:'#92400E'}}>
            Você está lançando o checklist <b>em atraso</b>, referente ao dia <b>{dataRef.split('-').reverse().slice(0,2).join('/')}</b>. A foto do painel é opcional neste caso.
          </div>
        </div>
      )}

      {/* Aviso de complemento de fim de dia */}
      {complemento && (
        <div style={{background:'#EFF6FF', border:`1px solid #BFDBFE`, borderRadius:12, padding:'12px 14px', marginBottom:16, display:'flex', gap:10}}>
          <Clock size={18} color={COR.azul} style={{flexShrink:0, marginTop:1}}/>
          <div style={{fontSize:13.5, color:'#1E40AF'}}>
            Você está fazendo um <b>complemento de fim de dia</b>. Serve para registrar a leitura final ou sinalizar que a máquina parou. A foto é opcional e a leitura da manhã continua valendo para o cálculo de {maquina.unidade==='km'?'km':'horas'}.
          </div>
        </div>
      )}

      {/* Aviso de parada em aberto */}
      {paradaAberta && !dataRef && !complemento && (
        <div style={{background:COR.vermelhoBg, border:`1px solid #FECACA`, borderRadius:12, padding:'12px 14px', marginBottom:16, display:'flex', gap:10}}>
          <AlertTriangle size={18} color={COR.vermelho} style={{flexShrink:0, marginTop:1}}/>
          <div style={{fontSize:13.5, color:'#991B1B'}}>
            Esta máquina está <b>parada</b> desde {dataHoraBR(paradaAberta.criadoEm)} ({paradaAberta.motivoParada}).
            Ao registrar como <b>Funcional</b>, o sistema calcula o tempo de indisponibilidade.
          </div>
        </div>
      )}

      <div style={{...S.card, display:'flex', flexDirection:'column', gap:18}}>
        {/* Nome do operador */}
        <div>
          <label style={S.rotulo}>Seu nome</label>
          <div style={{position:'relative'}}>
            <User size={18} color={COR.cinza} style={{position:'absolute', left:13, top:'50%', transform:'translateY(-50%)'}}/>
            <input value={operador} placeholder="Quem está registrando" style={{...S.campo, paddingLeft:42}} onChange={e => setOperador(e.target.value)}/>
          </div>
        </div>

        {/* Status */}
        <div>
          <label style={S.rotulo}>Status da máquina</label>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
            <button onClick={() => setStatus('funcional')} style={{padding:'16px 12px', borderRadius:12, border:`2px solid ${status==='funcional'?COR.verde:COR.borda}`, background: status==='funcional'?COR.verdeBg:'#fff', cursor:'pointer', fontFamily:'inherit', display:'flex', flexDirection:'column', alignItems:'center', gap:6}}>
              <CheckCircle2 size={26} color={status==='funcional'?COR.verde:COR.cinza}/>
              <span style={{fontSize:15, fontWeight:700, color: status==='funcional'?COR.verde:COR.texto}}>Funcional</span>
            </button>
            <button onClick={() => setStatus('nao_funcional')} style={{padding:'16px 12px', borderRadius:12, border:`2px solid ${status==='nao_funcional'?COR.vermelho:COR.borda}`, background: status==='nao_funcional'?COR.vermelhoBg:'#fff', cursor:'pointer', fontFamily:'inherit', display:'flex', flexDirection:'column', alignItems:'center', gap:6}}>
              <AlertTriangle size={26} color={status==='nao_funcional'?COR.vermelho:COR.cinza}/>
              <span style={{fontSize:15, fontWeight:700, color: status==='nao_funcional'?COR.vermelho:COR.texto}}>Não Funcional</span>
            </button>
          </div>
          {/* "Não houve atividade" — só em lançamento retroativo */}
          {dataRef && (
            <button onClick={() => setStatus('sem_atividade')} style={{marginTop:10, width:'100%', padding:'13px 12px', borderRadius:12, border:`2px solid ${status==='sem_atividade'?'#64748B':COR.borda}`, background: status==='sem_atividade'?'#F1F5F9':'#fff', cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', justifyContent:'center', gap:8}}>
              <CircleSlash size={20} color={status==='sem_atividade'?'#475569':COR.cinza}/>
              <span style={{fontSize:15, fontWeight:700, color: status==='sem_atividade'?'#475569':COR.texto}}>Não houve atividade</span>
            </button>
          )}
        </div>

        {status === 'sem_atividade' && (
          <div style={{background:'#F1F5F9', border:'1px solid #E2E8F0', borderRadius:12, padding:'12px 14px', fontSize:13.5, color:'#475569'}}>
            Você está registrando que <b>não houve atividade</b> neste dia. Não é necessário preencher horímetro, foto ou checklist. Basta confirmar com seu nome.
          </div>
        )}

        {/* Bloco Funcional */}
        {status === 'funcional' && (
          <>
            {temHorimetro ? (
              <div>
                <label style={S.rotulo}>{unidadeMedidor(maquina)} atual</label>
                <div style={{position:'relative', opacity: na ? .45 : 1}}>
                  <Gauge size={18} color={COR.cinza} style={{position:'absolute', left:13, top:'50%', transform:'translateY(-50%)'}}/>
                  <input type="number" inputMode="numeric" value={horimetro} disabled={na} placeholder="0" style={{...S.campo, paddingLeft:42}} onChange={e => setHorimetro(e.target.value)}/>
                  <span style={{position:'absolute', right:13, top:'50%', transform:'translateY(-50%)', color:COR.cinza, fontSize:13, fontWeight:600}}>{unidadeSufixo(maquina)}</span>
                </div>
                <label style={{display:'flex', alignItems:'center', gap:8, marginTop:10, cursor:'pointer', fontSize:14, color:COR.cinza, fontWeight:600}}>
                  <input type="checkbox" checked={na} onChange={e => { setNA(e.target.checked); if (e.target.checked) { setHorimetro(''); setFoto(null); setFotoPreview(''); } }} style={{width:17, height:17}}/>
                  Não Aplicável (sem {maquina.unidade==='km'?'hodômetro':'horímetro'})
                </label>
              </div>
            ) : (
              <div style={{background:'#F3F4F6', borderRadius:10, padding:'10px 13px', fontSize:13.5, color:COR.cinza}}>
                Esta máquina está cadastrada <b>sem {maquina.unidade==='km'?'hodômetro':'horímetro'}</b> — não é necessário informar leitura nem foto.
              </div>
            )}

            {/* Foto do painel (obrigatória se tem horímetro e não é NA) */}
            {exigeFoto && (
              <div>
                <label style={S.rotulo}>Foto do painel {(dataRef || complemento) ? <span style={{color:COR.cinza, fontWeight:500}}>(opcional)</span> : <span style={{color:COR.vermelho}}>*</span>}</label>
                {fotoPreview ? (
                  <div style={{position:'relative', borderRadius:12, overflow:'hidden', border:`1px solid ${COR.borda}`}}>
                    <img src={fotoPreview} alt="painel" style={{width:'100%', maxHeight:240, objectFit:'cover', display:'block'}}/>
                    <button onClick={() => { setFoto(null); setFotoPreview(''); }} style={{position:'absolute', top:8, right:8, background:'rgba(0,0,0,.6)', color:'#fff', border:'none', borderRadius:8, padding:'6px 10px', fontSize:12.5, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', gap:5}}><X size={14}/> Trocar</button>
                  </div>
                ) : (
                  <div style={{display:'flex', gap:10}}>
                    <label style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:6, border:`2px dashed ${COR.borda}`, borderRadius:12, padding:'24px 12px', cursor:'pointer', color:COR.cinza}}>
                      <Camera size={28} color={COR.azulCl}/>
                      <span style={{fontSize:13.5, fontWeight:600}}>Tirar foto</span>
                      <input type="file" accept="image/*" capture="environment" onChange={escolherFoto} style={{display:'none'}}/>
                    </label>
                    <label style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:6, border:`2px dashed ${COR.borda}`, borderRadius:12, padding:'24px 12px', cursor:'pointer', color:COR.cinza}}>
                      <Plus size={28} color={COR.azulCl}/>
                      <span style={{fontSize:13.5, fontWeight:600}}>Galeria</span>
                      <input type="file" accept="image/*" onChange={escolherFoto} style={{display:'none'}}/>
                    </label>
                  </div>
                )}
              </div>
            )}
          </>
        )}

        {/* Bloco Não Funcional */}
        {status === 'nao_funcional' && (
          <div>
            <label style={S.rotulo}>Motivo da parada</label>
            <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
              {MOTIVOS_PARADA.map(mt => (
                <button key={mt} onClick={() => setMotivo(mt)} style={{padding:'9px 15px', borderRadius:999, border:`1.5px solid ${motivo===mt?COR.vermelho:COR.borda}`, background: motivo===mt?COR.vermelhoBg:'#fff', color: motivo===mt?COR.vermelho:COR.texto, fontSize:14, fontWeight:600, cursor:'pointer', fontFamily:'inherit'}}>{mt}</button>
              ))}
            </div>
          </div>
        )}

        {/* Checklist de itens (não aparece em "sem atividade") */}
        {status && status !== 'sem_atividade' && (checklistItens || []).length > 0 && (
          <div>
            <div style={{height:1, background:COR.borda, margin:'2px 0 14px'}} />
            <label style={S.rotulo}>Checklist de itens</label>
            <div style={{display:'flex', flexDirection:'column', gap:8, marginTop:4}}>
              {checklistItens.map((item, i) => {
                const r = check[item] || { status:null, obs:'' };
                return (
                  <div key={i} style={{border:`1px solid ${COR.borda}`, borderRadius:11, padding:'10px 12px'}}>
                    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:10}}>
                      <span style={{fontSize:14, fontWeight:600, color:COR.texto, flex:1}}>{item}</span>
                      <div style={{display:'flex', gap:6, flexShrink:0}}>
                        <button onClick={() => setItem(item, 'status', r.status==='ok'?null:'ok')} style={{padding:'6px 12px', borderRadius:8, border:`1.5px solid ${r.status==='ok'?COR.verde:COR.borda}`, background:r.status==='ok'?COR.verdeBg:'#fff', color:r.status==='ok'?COR.verde:COR.cinza, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>OK</button>
                        <button onClick={() => setItem(item, 'status', r.status==='nok'?null:'nok')} style={{padding:'6px 12px', borderRadius:8, border:`1.5px solid ${r.status==='nok'?COR.vermelho:COR.borda}`, background:r.status==='nok'?COR.vermelhoBg:'#fff', color:r.status==='nok'?COR.vermelho:COR.cinza, fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>Não OK</button>
                      </div>
                    </div>
                    {r.status==='nok' && (
                      <input value={r.obs} placeholder="O que há de errado? (opcional)" style={{...S.campo, padding:'8px 11px', fontSize:13.5, marginTop:8}} onChange={e => setItem(item, 'obs', e.target.value)} />
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Fotos extras (sempre que escolheu status) */}
        {status && (
          <div>
            <label style={S.rotulo}>Fotos adicionais (opcional)</label>
            <div style={{display:'flex', flexWrap:'wrap', gap:10}}>
              {extras.map((x, i) => (
                <div key={i} style={{position:'relative', width:88, height:88, borderRadius:10, overflow:'hidden', border:`1px solid ${COR.borda}`}}>
                  <img src={x.preview} alt={'extra'+i} style={{width:'100%', height:'100%', objectFit:'cover'}}/>
                  <button onClick={() => removerExtra(i)} style={{position:'absolute', top:3, right:3, background:'rgba(0,0,0,.6)', color:'#fff', border:'none', borderRadius:6, width:22, height:22, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center'}}><X size={13}/></button>
                </div>
              ))}
              <label style={{width:88, height:88, borderRadius:10, border:`2px dashed ${COR.borda}`, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:3, cursor:'pointer', color:COR.cinza}}>
                <Camera size={22} color={COR.azulCl}/>
                <span style={{fontSize:11, fontWeight:600}}>Tirar foto</span>
                <input type="file" accept="image/*" capture="environment" onChange={addExtras} style={{display:'none'}}/>
              </label>
              <label style={{width:88, height:88, borderRadius:10, border:`2px dashed ${COR.borda}`, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:3, cursor:'pointer', color:COR.cinza}}>
                <Plus size={22} color={COR.azulCl}/>
                <span style={{fontSize:11, fontWeight:600}}>Galeria</span>
                <input type="file" accept="image/*" multiple onChange={addExtras} style={{display:'none'}}/>
              </label>
            </div>
          </div>
        )}

        {/* Observação (opcional) */}
        {status && (
          <div>
            <label style={S.rotulo}>Observação geral (opcional)</label>
            <textarea value={obs} rows={2} placeholder="Algo a registrar…" style={{...S.campo, resize:'vertical'}} onChange={e => setObs(e.target.value)}/>
          </div>
        )}

        {erro && <div style={{color:COR.vermelho, fontSize:13.5, fontWeight:600}}>{erro}</div>}

        <button onClick={validarEConfirmar} disabled={salvando} style={{...S.botaoPrim, opacity: salvando?.7:1}}>
          {salvando ? 'Enviando…' : <><CheckCircle2 size={18}/> Finalizar registro</>}
        </button>
      </div>
    </div>
  );
}

// --- Operador: tela de sucesso ---
function OperadorSucesso({ info, onNovo, onSair }) {
  const [gerando, setGerando] = useState(false);
  async function baixarPdf() {
    if (!info.registro || !info.maquinaObj) return;
    setGerando(true);
    try { await gerarPdfRegistro(info.registro, info.maquinaObj); }
    catch (e) { console.error(e); alert('Não foi possível gerar o PDF.'); }
    finally { setGerando(false); }
  }
  return (
    <div style={{maxWidth:440, margin:'40px auto 0', textAlign:'center', padding:'0 16px'}}>
      <div style={{width:80, height:80, borderRadius:'50%', background: info.offline ? COR.amareloBg : COR.verdeBg, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 18px'}}>
        {info.offline ? <Clock size={44} color={COR.amarelo}/> : <CheckCircle2 size={44} color={COR.verde}/>}
      </div>
      <h2 style={{margin:'0 0 8px', fontSize:23, fontWeight:800, color:COR.texto}}>{info.offline ? 'Registro salvo!' : 'Registro enviado!'}</h2>
      <p style={{margin:'0 0 6px', color:COR.cinza, fontSize:15}}>{info.maquina}</p>
      {info.offline && (

// Calendário mensal de uma máquina: verde (funcional), vermelho (não funcional), cinza (sem registro)
function CalendarioMaquina({ maquina, registros, ini, fim, onEditarDia }) {
  // agrupa registros da máquina por dia
  const porDia = {};
  for (const r of registros) {
    if (r.maquinaId !== maquina.id) continue;
    const dia = r.dataRef || new Date(r.criadoEm).toISOString().slice(0,10);
    (porDia[dia] = porDia[dia] || []).push(r);
  }
  // status por dia (regra das 14h)
  const statusPorDia = {};
  for (const dia in porDia) statusPorDia[dia] = statusDoDia(porDia[dia]);

  // monta os meses cobertos pelo período
  const d0 = new Date((ini || fim) + 'T00:00:00');
  const d1 = new Date((fim || ini) + 'T00:00:00');
  const meses = [];
  let cursor = new Date(d0.getFullYear(), d0.getMonth(), 1);
  while (cursor <= d1) { meses.push(new Date(cursor)); cursor.setMonth(cursor.getMonth()+1); }

  const nomesMes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const diasSemana = ['D','S','T','Q','Q','S','S'];

  function corDia(iso) {
    const st = statusPorDia[iso];
    if (st === 'funcional') return { bg: COR.verde, fg: '#fff' };
    if (st === 'nao_funcional') return { bg: COR.vermelho, fg: '#fff' };
    if (st === 'sem_atividade') return { bg: '#64748B', fg: '#fff' };
    return { bg: '#EFF1F4', fg: COR.cinza };
  }

  return (
    <div style={{...S.card, marginBottom:18}}>
      <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:14, flexWrap:'wrap'}}>
        <Calendar size={18} color={COR.azul}/>
        <span style={{fontSize:15, fontWeight:800, color:COR.texto}}>Calendário · {maquina.codigo ? maquina.codigo+' · ' : ''}{maquina.descricao}</span>
      </div>
      <div style={{display:'flex', gap:16, flexWrap:'wrap', marginBottom:16}}>
        <span style={{display:'flex', alignItems:'center', gap:6, fontSize:12.5, color:COR.cinza}}><span style={{width:13, height:13, borderRadius:4, background:COR.verde, display:'inline-block'}}/> Funcional</span>
        <span style={{display:'flex', alignItems:'center', gap:6, fontSize:12.5, color:COR.cinza}}><span style={{width:13, height:13, borderRadius:4, background:COR.vermelho, display:'inline-block'}}/> Não funcional</span>
        <span style={{display:'flex', alignItems:'center', gap:6, fontSize:12.5, color:COR.cinza}}><span style={{width:13, height:13, borderRadius:4, background:'#64748B', display:'inline-block'}}/> Sem atividade</span>
        <span style={{display:'flex', alignItems:'center', gap:6, fontSize:12.5, color:COR.cinza}}><span style={{width:13, height:13, borderRadius:4, background:'#EFF1F4', display:'inline-block'}}/> Sem checklist</span>
        {onEditarDia && <span style={{fontSize:12, color:COR.azul, fontWeight:600, marginLeft:'auto'}}>Clique num dia para editar/lançar</span>}
      </div>

      <div style={{display:'flex', flexWrap:'wrap', gap:22}}>
        {meses.map((mes, idx) => {
          const ano = mes.getFullYear(), m = mes.getMonth();
          const primeiroDiaSemana = new Date(ano, m, 1).getDay();
          const totalDias = new Date(ano, m+1, 0).getDate();
          const celulas = [];
          for (let i = 0; i < primeiroDiaSemana; i++) celulas.push(null);
          for (let dia = 1; dia <= totalDias; dia++) celulas.push(dia);
          return (
            <div key={idx} style={{minWidth:210}}>
              <div style={{fontSize:13.5, fontWeight:700, color:COR.texto, marginBottom:8, textAlign:'center'}}>{nomesMes[m]} {ano}</div>
              <div style={{display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:3}}>
                {diasSemana.map((d,i) => <div key={'h'+i} style={{fontSize:10.5, fontWeight:700, color:COR.cinza, textAlign:'center', paddingBottom:2}}>{d}</div>)}
                {celulas.map((dia, i) => {
                  if (dia === null) return <div key={'e'+i} />;
                  const iso = `${ano}-${String(m+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                  const dentro = (!ini || iso >= ini) && (!fim || iso <= fim);
                  const cor = corDia(iso);
                  const regsDoDia = porDia[iso] || [];
                  // registro de referência p/ editar: o último não-complemento do dia, ou o primeiro
                  const regRef = [...regsDoDia].reverse().find(r => !r.complemento) || regsDoDia[0] || null;
                  const podeEditar = !!onEditarDia;
                  return (
                    <div key={i} title={iso.split('-').reverse().join('/') + (podeEditar ? ' — clique para editar' : '')}
                      onClick={podeEditar ? () => onEditarDia(iso, regRef) : undefined}
                      style={{
                        aspectRatio:'1', display:'flex', alignItems:'center', justifyContent:'center',
                        borderRadius:6, fontSize:11.5, fontWeight:700,
                        background: dentro ? cor.bg : '#F8FAFC', color: dentro ? cor.fg : '#CBD5E1',
                        opacity: dentro ? 1 : .5,
                        cursor: podeEditar ? 'pointer' : 'default',
                      }}>{dia}</div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function TelaRelatorios({ registros, maquinas, onVoltar, onSalvarAjuste }) {
  const hoje = new Date().toISOString().slice(0,10);
  const mesPassado = new Date(Date.now() - 30*86400000).toISOString().slice(0,10);
  const [ini, setIni] = useState(mesPassado);
  const [fim, setFim] = useState(hoje);
  const [fObra, setFObra] = useState('todas');
  const [fMaquina, setFMaquina] = useState('todas');
  const [fEmpresa, setFEmpresa] = useState('todas');
  const [editandoDia, setEditandoDia] = useState(null);

  const obras = Array.from(new Set(maquinas.map(m => m.obra).filter(Boolean))).sort((a,b)=>a.localeCompare(b,'pt-BR'));
  // lista de empresas (Axial + locadoras cadastradas)
  const empresas = Array.from(new Set(maquinas.map(empresaDaMaquina).filter(Boolean))).sort((a,b)=>a.localeCompare(b,'pt-BR'));
  // máquinas disponíveis no seletor (respeitam obra e empresa escolhidas)
  const maquinasDoFiltro = maquinas.filter(m =>
    (fObra === 'todas' || m.obra === fObra) &&
    (fEmpresa === 'todas' || empresaDaMaquina(m) === fEmpresa)
  );

  // aplica os filtros ao conjunto de máquinas considerado
  const maquinasFiltradas = maquinas.filter(m => {
    if (fObra !== 'todas' && m.obra !== fObra) return false;
    if (fEmpresa !== 'todas' && empresaDaMaquina(m) !== fEmpresa) return false;
    if (fMaquina !== 'todas' && m.id !== fMaquina) return false;
    return true;
  });
  const idsFiltrados = new Set(maquinasFiltradas.map(m => m.id));
  const registrosFiltrados = registros.filter(r => idsFiltrados.has(r.maquinaId));

  const resumo = calcularResumoPeriodo(registrosFiltrados, maquinasFiltradas, ini, fim);
  const faltas = diasSemRegistro(registrosFiltrados, maquinasFiltradas, ini, fim);
  const totalAtivas = maquinas.filter(m => m.ativa).length;
  const registrosPeriodo = registrosFiltrados.filter(r => {
    const t = new Date(r.criadoEm).getTime();
    const a = ini ? new Date(ini+'T00:00:00').getTime() : -Infinity;
    const b = fim ? new Date(fim+'T23:59:59').getTime() : Infinity;
    return t >= a && t <= b;

      </div>

      <div style={{...S.cardFiltro, display:'flex', flexWrap:'wrap', gap:14, alignItems:'flex-end', marginBottom:18}}>
        <CabecalhoFiltros />
        <div>
          <label style={S.rotulo}>De</label>
          <input type="date" value={ini} style={{...S.campo, width:'auto'}} onChange={e => setIni(e.target.value)}/>
        </div>
        <div>
          <label style={S.rotulo}>Até</label>
          <input type="date" value={fim} style={{...S.campo, width:'auto'}} onChange={e => setFim(e.target.value)}/>
        </div>
        <div>
          <label style={S.rotulo}>Obra</label>
          <select value={fObra} style={{...S.campo, width:'auto', padding:'9px 12px'}} onChange={e => { setFObra(e.target.value); setFMaquina('todas'); }}>
            <option value="todas">Todas as obras</option>
            {obras.map(o => <option key={o} value={o}>{o}</option>)}

        </div>
        <div>
          <label style={S.rotulo}>Empresa</label>

            <option value="todas">Todas as empresas</option>
            {empresas.map(emp => <option key={emp} value={emp}>{emp}</option>)}

        </div>
        <div>
          <label style={S.rotulo}>Máquina</label>

            <option value="todas">Todas as máquinas</option>

        </div>

          <button onClick={() => gerarPdfCalendarios(maquinasFiltradas, registrosFiltrados, resumo, ini, fim)} disabled={!maquinasFiltradas.length} style={{...S.botaoSec, opacity: maquinasFiltradas.length?1:.5}}>
            <Calendar size={18}/> Exportar calendário

          <button onClick={() => gerarPdfTodosRegistros(registrosPeriodo, ini, fim, maquinas)} disabled={!registrosPeriodo.length} style={{...S.botaoSec, opacity: registrosPeriodo.length?1:.5}}>

      {faltas.length > 0 && (
        <div style={{...S.card, marginBottom:18, padding:0, overflow:'hidden'}}>
          <div style={{display:'flex', alignItems:'center', gap:9, padding:'13px 16px', borderBottom:`1px solid ${COR.borda}`, background:COR.vermelhoBg}}>

            <span style={{marginLeft:'auto', fontSize:12.5, fontWeight:800, color:'#fff', background:COR.vermelho, padding:'2px 10px', borderRadius:999}}>{faltas.length}</span>
          </div>
          <div style={{display:'flex', flexDirection:'column'}}>
            {faltas.map(({ maquina, faltantes, totalDias }) => (
              <div key={maquina.id} style={{padding:'11px 16px', borderBottom:`1px solid ${COR.bg}`}}>
                <div style={{display:'flex', justifyContent:'space-between', gap:10, alignItems:'baseline'}}>
                  <span style={{fontSize:14.5, fontWeight:700, color:COR.texto}}>{maquina.codigo ? maquina.codigo+' · ' : ''}{maquina.descricao}</span>
                  <span style={{fontSize:12.5, fontWeight:700, color:COR.vermelho, whiteSpace:'nowrap'}}>{faltantes.length} de {totalDias} dias sem check</span>
                </div>
                <div style={{fontSize:12, color:COR.cinza, marginTop:2, display:'flex', alignItems:'center', gap:5, flexWrap:'wrap'}}>
                  <Building size={12}/> {maquina.obra || 'Sem obra'}
                  <span style={{color: maquina.tipo==='prestador'?'#7C3AED':COR.azulCl, fontWeight:600}}>· {empresaDaMaquina(maquina)}</span>
                </div>
                <div style={{fontSize:11.5, color:COR.cinza, marginTop:3}}>
                  {faltantes.slice(0,10).map(d => d.split('-').reverse().slice(0,2).join('/')).join(', ')}{faltantes.length > 10 ? '…' : ''}
                </div>
              </div>

          </div>
        </div>

      {resumo.length > 0 && (
        <div style={{display:'flex', alignItems:'center', gap:8, margin:'0 2px 10px'}}>
          <CheckCircle2 size={17} color={COR.verde}/>
          <span style={{fontSize:14.5, fontWeight:800, color:COR.texto}}>Checks realizados</span>
        </div>
      )}

      {resumo.length === 0 ? (
        <div style={{textAlign:'center', padding:'48px 20px', color:COR.cinza}}>
          <FileText size={40} color={COR.borda}/>
          <p style={{marginTop:12, fontWeight:600}}>Nenhum registro neste período.</p>
        </div>
      ) : (
        <div style={{display:'flex', flexDirection:'column', gap:12}}>
          {resumo.map(r => (
            <div key={r.maquina.id} style={{...S.card, padding:'12px 14px'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:10, marginBottom:8}}>

                  <div style={{fontSize:14.5, fontWeight:800, color:COR.texto}}>{r.maquina.codigo ? r.maquina.codigo+' · ' : ''}{r.maquina.descricao}</div>
                  <div style={{fontSize:12, color:COR.cinza, marginTop:1}}>{r.maquina.obra || 'Sem obra'}</div>

function ConfigChecklist({ itens, onSalvar, onFechar }) {
  const [lista, setLista] = useState(itens && itens.length ? [...itens] : []);
  const [novo, setNovo] = useState('');

  function add() { if (novo.trim()) { setLista([...lista, novo.trim()]); setNovo(''); } }
  function remover(i) { setLista(lista.filter((_, idx) => idx !== i)); }
  function mover(i, dir) {
    const j = i + dir; if (j < 0 || j >= lista.length) return;
    const nova = [...lista]; [nova[i], nova[j]] = [nova[j], nova[i]]; setLista(nova);
  }

  return (
    <div style={{position:'fixed', inset:0, background:'rgba(15,23,42,.45)', zIndex:500, display:'flex', alignItems:'flex-end', justifyContent:'center'}} onClick={onFechar}>
      <div onClick={e => e.stopPropagation()} style={{background:'#fff', width:'100%', maxWidth:560, borderRadius:'18px 18px 0 0', padding:20, maxHeight:'85vh', overflow:'auto'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
          <h3 style={{margin:0, fontSize:18, fontWeight:800, color:COR.azul, display:'flex', alignItems:'center', gap:8}}><List size={20}/> Itens do checklist</h3>
          <button onClick={onFechar} style={{...S.botaoSec, padding:8, borderRadius:8}}><X size={18}/></button>
        </div>

        <div style={{display:'flex', gap:8, marginBottom:16}}>
          <input value={novo} placeholder="Novo item de checklist" style={S.campo} onChange={e => setNovo(e.target.value)} onKeyDown={e => e.key==='Enter' && add()}/>
          <button onClick={add} style={{...S.botaoPrim, padding:'11px 16px'}}><Plus size={18}/></button>
        </div>

        <div style={{display:'flex', flexDirection:'column', gap:8}}>
          {lista.length === 0 && <p style={{color:COR.cinza, textAlign:'center', padding:'20px 0'}}>Nenhum item.</p>}
          {lista.map((it, i) => (
            <div key={i} style={{display:'flex', alignItems:'center', gap:8, padding:'10px 12px', border:`1px solid ${COR.borda}`, borderRadius:10}}>
              <span style={{flex:1, fontWeight:600, color:COR.texto, fontSize:14}}>{it}</span>
              <button onClick={() => mover(i,-1)} disabled={i===0} style={{...S.botaoSec, padding:'5px 9px', opacity:i===0?.3:1}}>↑</button>
              <button onClick={() => mover(i,1)} disabled={i===lista.length-1} style={{...S.botaoSec, padding:'5px 9px', opacity:i===lista.length-1?.3:1}}>↓</button>
              <button onClick={() => remover(i)} style={{...S.botaoSec, padding:'5px 9px', color:COR.vermelho, borderColor:'#FECACA'}}><Trash2 size={15}/></button>
            </div>
          ))}
        </div>

        <button onClick={() => onSalvar(lista)} style={{...S.botaoPrim, width:'100%', marginTop:16}}><Save size={18}/> Salvar checklist</button>
        <p style={{fontSize:12, color:COR.cinza, marginTop:12, lineHeight:1.5}}>
          Estes itens são o checklist <b>padrão</b>, usado por máquinas que não têm um checklist próprio. Vale para todos os dispositivos.
        </p>
      </div>
    </div>
  );
}

function TelaChecklistMaquinas({ maquinas, padrao, onSalvarMaquina, onVoltar }) {
  const [sel, setSel] = useState(null);        // máquina selecionada
  const [lista, setLista] = useState([]);
  const [novo, setNovo] = useState('');
  const [proprio, setProprio] = useState(false); // true = customizado; false = usando padrão
  const [salvando, setSalvando] = useState(false);
  const [fObra, setFObra] = useState('todas');

  function escolher(m) {
    setSel(m);
    const temProprio = Array.isArray(m.checklistProprio) && m.checklistProprio.length > 0;
    setProprio(temProprio);
    setLista(temProprio ? [...m.checklistProprio] : [...(padrao || [])]);
    setNovo('');
  }
  function add() { if (novo.trim()) { setLista([...lista, novo.trim()]); setNovo(''); setProprio(true); } }
  function remover(i) { setLista(lista.filter((_, idx) => idx !== i)); setProprio(true); }
  function mover(i, dir) {
    const j = i + dir; if (j < 0 || j >= lista.length) return;
    const nova = [...lista]; [nova[i], nova[j]] = [nova[j], nova[i]]; setLista(nova); setProprio(true);
  }
  function restaurarPadrao() {
    setLista([...(padrao || [])]); setProprio(false);
  }
  async function salvar() {
    if (!sel) return;
    setSalvando(true);
    // se "proprio" = false, grava null (volta a usar o padrão); senão grava a lista
    await onSalvarMaquina(sel, proprio ? lista : null);
    setSalvando(false);
    setSel(null);
  }

  // lista de seleção de máquina
  if (!sel) {
    const ativas = maquinas.filter(m => m.ativa);
    const obras = Array.from(new Set(ativas.map(m => m.obra || 'Sem obra'))).sort((a,b)=>a.localeCompare(b,'pt-BR'));
    const filtradas = ativas.filter(m => fObra === 'todas' || (m.obra || 'Sem obra') === fObra);
    return (
      <div style={{maxWidth:760, margin:'0 auto'}}>
        <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:18}}>
          <button onClick={onVoltar} style={{...S.botaoSec, padding:10, borderRadius:10}} aria-label="Voltar"><ArrowLeft size={20}/></button>
          <h2 style={{margin:0, fontSize:22, fontWeight:800, color:COR.azul}}>Checklist por máquina</h2>
        </div>
        <p style={{fontSize:13.5, color:COR.cinza, margin:'0 0 16px'}}>Escolha uma máquina para personalizar o checklist dela. Quem não for personalizada usa o checklist padrão.</p>
        <div style={{marginBottom:16}}>
          <label style={S.rotulo}>Filtrar por obra</label>
          <select value={fObra} style={{...S.campo, width:'auto', padding:'9px 12px'}} onChange={e => setFObra(e.target.value)}>
            <option value="todas">Todas as obras ({ativas.length})</option>
            {obras.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:10}}>
          {filtradas.map(m => {
            const custom = Array.isArray(m.checklistProprio) && m.checklistProprio.length > 0;
            return (
              <button key={m.id} onClick={() => escolher(m)} style={{display:'flex', alignItems:'center', gap:12, background:'#fff', border:`1.5px solid ${COR.borda}`, borderRadius:14, padding:'14px 16px', cursor:'pointer', fontFamily:'inherit', textAlign:'left', width:'100%'}}>
                <div style={{width:40, height:40, borderRadius:10, background:'#EFF6FF', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}><Factory size={20} color={COR.azul}/></div>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:15, fontWeight:700, color:COR.texto}}>{m.codigo ? m.codigo+' · ' : ''}{m.descricao}</div>
                  <div style={{fontSize:12.5, color:COR.cinza, marginTop:1}}>{m.obra || 'Sem obra'}</div>
                </div>
                {custom
                  ? <Badge cor={COR.azul} bg="#EFF6FF"><List size={11}/> Personalizado</Badge>
                  : <Badge cor={COR.cinza} bg="#F3F4F6">Padrão</Badge>}
                <ChevronRight size={18} color={COR.cinza}/>
              </button>
            );
          })}
          {filtradas.length === 0 && <p style={{textAlign:'center', color:COR.cinza, padding:'30px 0'}}>Nenhuma máquina nesta obra.</p>}
        </div>
      </div>
    );
  }

  // edição do checklist da máquina escolhida
  return (
    <div style={{maxWidth:620, margin:'0 auto'}}>
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:8}}>
        <button onClick={() => setSel(null)} style={{...S.botaoSec, padding:10, borderRadius:10}} aria-label="Voltar"><ArrowLeft size={20}/></button>
        <div>
          <h2 style={{margin:0, fontSize:19, fontWeight:800, color:COR.azul}}>{sel.codigo ? sel.codigo+' · ' : ''}{sel.descricao}</h2>
          <p style={{margin:'2px 0 0', fontSize:13, color:COR.cinza}}>{proprio ? 'Checklist personalizado' : 'Usando o checklist padrão'}</p>
        </div>
      </div>

      <div style={{...S.card, marginTop:12}}>
        <div style={{display:'flex', gap:8, marginBottom:16}}>
          <input value={novo} placeholder="Adicionar item ao checklist" style={S.campo} onChange={e => setNovo(e.target.value)} onKeyDown={e => e.key==='Enter' && add()}/>
          <button onClick={add} style={{...S.botaoPrim, padding:'11px 16px'}}><Plus size={18}/></button>
        </div>

        <div style={{display:'flex', flexDirection:'column', gap:8}}>
          {lista.length === 0 && <p style={{color:COR.cinza, textAlign:'center', padding:'20px 0'}}>Nenhum item.</p>}
          {lista.map((it, i) => (
            <div key={i} style={{display:'flex', alignItems:'center', gap:8, padding:'10px 12px', border:`1px solid ${COR.borda}`, borderRadius:10}}>
              <span style={{flex:1, fontWeight:600, color:COR.texto, fontSize:14}}>{it}</span>
              <button onClick={() => mover(i,-1)} disabled={i===0} style={{...S.botaoSec, padding:'5px 9px', opacity:i===0?.3:1}}>↑</button>
              <button onClick={() => mover(i,1)} disabled={i===lista.length-1} style={{...S.botaoSec, padding:'5px 9px', opacity:i===lista.length-1?.3:1}}>↓</button>
              <button onClick={() => remover(i)} style={{...S.botaoSec, padding:'5px 9px', color:COR.vermelho, borderColor:'#FECACA'}}><Trash2 size={15}/></button>
            </div>
          ))}
        </div>

        <div style={{display:'flex', gap:10, marginTop:16, flexWrap:'wrap'}}>
          <button onClick={salvar} disabled={salvando} style={{...S.botaoPrim, flex:1, opacity:salvando?.7:1}}><Save size={18}/> {salvando?'Salvando…':'Salvar'}</button>
          {proprio && <button onClick={restaurarPadrao} style={S.botaoSec}>Voltar ao padrão</button>}
        </div>
        <p style={{fontSize:12, color:COR.cinza, marginTop:12, lineHeight:1.5}}>
          {proprio
            ? 'Esta máquina terá um checklist próprio. "Voltar ao padrão" faz ela seguir o checklist padrão global novamente.'
            : 'Esta máquina segue o checklist padrão. Ao adicionar ou remover itens, ela passa a ter um checklist próprio.'}
        </p>
      </div>
    </div>
  );
}

// Editor de status de um dia (admin) — edita registro existente ou cria do zero
function EditorStatusDia({ maquina, data, registro, onSalvar, onFechar }) {
  const [status, setStatus] = useState(registro ? registro.status : 'funcional');
  const [motivo, setMotivo] = useState(registro ? (registro.motivoParada || '') : '');
  const [obs, setObs] = useState(registro ? (registro.observacao || '') : '');
  const [salvando, setSalvando] = useState(false);

  async function salvar() {
    if (status === 'nao_funcional' && !motivo) return;
    setSalvando(true);
    await onSalvar({ status, motivo: status === 'nao_funcional' ? motivo : '', observacao: obs });
    setSalvando(false);
  }
  const dataBR = data.split('-').reverse().join('/');

  return (
    <div style={{position:'fixed', inset:0, background:'rgba(15,23,42,.55)', zIndex:600, display:'flex', alignItems:'center', justifyContent:'center', padding:18}} onClick={onFechar}>
      <div style={{...S.card, maxWidth:440, width:'100%', maxHeight:'90vh', overflow:'auto'}} onClick={e => e.stopPropagation()}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14}}>
          <div>
            <h3 style={{margin:0, fontSize:18, fontWeight:800, color:COR.azul}}>{registro ? 'Editar status' : 'Lançar status'}</h3>
            <p style={{margin:'3px 0 0', fontSize:13, color:COR.cinza}}>{maquina.codigo ? maquina.codigo+' · ' : ''}{maquina.descricao} · {dataBR}</p>
          </div>
          <button onClick={onFechar} style={{...S.botaoSec, padding:8, borderRadius:9}}><X size={18}/></button>
        </div>

        {!registro && (
          <div style={{background:'#EFF6FF', border:'1px solid #BFDBFE', borderRadius:10, padding:'10px 12px', marginBottom:14, fontSize:13, color:'#1E40AF'}}>
            Este dia não tinha registro. Você está criando o status manualmente.
          </div>
        )}

        <label style={S.rotulo}>Status da máquina</label>
        <div style={{display:'flex', gap:10, marginBottom:10}}>
          <button onClick={() => setStatus('funcional')} style={{flex:1, padding:'12px', borderRadius:11, border:`1.5px solid ${status==='funcional'?COR.verde:COR.borda}`, background: status==='funcional'?COR.verdeBg:'#fff', color: status==='funcional'?COR.verde:COR.texto, fontSize:14.5, fontWeight:700, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', justifyContent:'center', gap:6}}><CheckCircle2 size={17}/> Funcional</button>
          <button onClick={() => setStatus('nao_funcional')} style={{flex:1, padding:'12px', borderRadius:11, border:`1.5px solid ${status==='nao_funcional'?COR.vermelho:COR.borda}`, background: status==='nao_funcional'?COR.vermelhoBg:'#fff', color: status==='nao_funcional'?COR.vermelho:COR.texto, fontSize:14.5, fontWeight:700, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', justifyContent:'center', gap:6}}><AlertTriangle size={17}/> Não funcional</button>
        </div>
        <button onClick={() => setStatus('sem_atividade')} style={{width:'100%', marginBottom:14, padding:'12px', borderRadius:11, border:`1.5px solid ${status==='sem_atividade'?'#64748B':COR.borda}`, background: status==='sem_atividade'?'#F1F5F9':'#fff', color: status==='sem_atividade'?'#475569':COR.texto, fontSize:14.5, fontWeight:700, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', justifyContent:'center', gap:6}}><CircleSlash size={17}/> Não houve atividade</button>

        {status === 'sem_atividade' && (
          <div style={{background:'#F1F5F9', border:'1px solid #E2E8F0', borderRadius:10, padding:'10px 12px', marginBottom:14, fontSize:13, color:'#475569'}}>
            Registrando que não houve atividade neste dia. Não é necessário motivo nem checklist.
          </div>
        )}

        {status === 'nao_funcional' && (
          <div style={{marginBottom:14}}>
            <label style={S.rotulo}>Motivo da parada</label>
            <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
              {MOTIVOS_PARADA.map(mt => (
                <button key={mt} onClick={() => setMotivo(mt)} style={{padding:'8px 14px', borderRadius:9, border:`1.5px solid ${motivo===mt?COR.vermelho:COR.borda}`, background: motivo===mt?COR.vermelhoBg:'#fff', color: motivo===mt?COR.vermelho:COR.texto, fontSize:13.5, fontWeight:600, cursor:'pointer', fontFamily:'inherit'}}>{mt}</button>
              ))}
            </div>
          </div>
        )}

        <label style={S.rotulo}>Observação</label>
        <textarea value={obs} rows={2} placeholder="Opcional" style={{...S.campo, resize:'vertical', marginBottom:16}} onChange={e => setObs(e.target.value)}/>

        <div style={{display:'flex', gap:10}}>
          <button onClick={salvar} disabled={salvando || (status==='nao_funcional' && !motivo)} style={{...S.botaoPrim, flex:1, opacity:(salvando || (status==='nao_funcional' && !motivo))?.6:1}}>
            <Save size={17}/> {salvando ? 'Salvando…' : 'Salvar'}
          </button>
          <button onClick={onFechar} style={S.botaoSec}>Cancelar</button>
        </div>
        <p style={{fontSize:11.5, color:COR.cinza, marginTop:12, lineHeight:1.5}}>O registro ficará marcado como ajuste do administrador. Isso não altera o cálculo de km/horas (baseado nas leituras de horímetro).</p>
      </div>
    </div>
  );
}

// ADMIN: TELA DE REGISTROS (checklists recebidos)
// ============================================================
function TelaRegistros({ registros, maquinas, onVoltar, onExcluirPeriodo, onSalvarAjuste }) {
  const hoje = new Date().toISOString().slice(0,10);
  const mesPassado = new Date(Date.now() - 30*86400000).toISOString().slice(0,10);
  const [ini, setIni] = useState(mesPassado);
  const [fim, setFim] = useState(hoje);
  const [expandido, setExpandido] = useState(null);
  const [mostrarExcluir, setMostrarExcluir] = useState(false);
  const [editando, setEditando] = useState(null); // { maquina, data, registro }
  const [senha, setSenha] = useState('');
  const [erroSenha, setErroSenha] = useState('');
  const [excluindo, setExcluindo] = useState(false);
  const [fObra, setFObra] = useState('todas');
  const [fMaquina, setFMaquina] = useState('todas');

  // obras presentes nos registros
  const obrasNosRegistros = Array.from(new Set(registros.map(r => r.obra).filter(Boolean))).sort((a,b)=>a.localeCompare(b,'pt-BR'));
  // máquinas disponíveis no seletor (respeitam a obra escolhida)
  const maquinasDoFiltro = maquinas.filter(m => fObra === 'todas' || m.obra === fObra);

  const noPeriodo = registros.filter(r => {
    const t = new Date(r.criadoEm).getTime();
    const a = ini ? new Date(ini+'T00:00:00').getTime() : -Infinity;
    const b = fim ? new Date(fim+'T23:59:59').getTime() : Infinity;
    if (t < a || t > b) return false;
    if (fObra !== 'todas' && r.obra !== fObra) return false;
    if (fMaquina !== 'todas' && r.maquinaId !== fMaquina) return false;
    return true;
  });

  const mapaMaquinas = {};
  for (const m of maquinas) mapaMaquinas[m.id] = m;

  async function confirmarExclusao() {
    setErroSenha('');
    if (senha !== SENHA_ADMIN) { setErroSenha('Senha incorreta.'); return; }
    setExcluindo(true);
    try {
      const r = await onExcluirPeriodo(ini, fim, fObra);
      setMostrarExcluir(false); setSenha('');
      alert(`${r.apagados} registro(s) excluído(s) e fotos removidas.`);
    } catch (e) {
      setErroSenha('Erro ao excluir. Tente novamente.');
    } finally { setExcluindo(false); }
  }

  return (
    <div style={{maxWidth:820, margin:'0 auto'}}>
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:18}}>
        <button onClick={onVoltar} style={{...S.botaoSec, padding:10, borderRadius:10}} aria-label="Voltar"><ArrowLeft size={20}/></button>
        <h2 style={{margin:0, fontSize:22, fontWeight:800, color:COR.azul}}>Registros recebidos</h2>
      </div>

      {/* Revisões pendentes */}
      <div style={{marginBottom:18}}><CardRevisao maquinas={maquinas} /></div>

      {/* Filtro de período */}
      <div style={{...S.cardFiltro, display:'flex', flexWrap:'wrap', gap:14, alignItems:'flex-end', marginBottom:18}}>
        <CabecalhoFiltros />
        <div>
          <label style={S.rotulo}>De</label>
          <input type="date" value={ini} style={{...S.campo, width:'auto'}} onChange={e => setIni(e.target.value)}/>
        </div>
        <div>
          <label style={S.rotulo}>Até</label>
          <input type="date" value={fim} style={{...S.campo, width:'auto'}} onChange={e => setFim(e.target.value)}/>
        </div>
        <div>
          <label style={S.rotulo}>Obra</label>
          <select value={fObra} style={{...S.campo, width:'auto', padding:'9px 12px'}} onChange={e => { setFObra(e.target.value); setFMaquina('todas'); }}>
            <option value="todas">Todas as obras</option>
            {obrasNosRegistros.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        </div>
        <div>
          <label style={S.rotulo}>Veículo / máquina</label>
          <select value={fMaquina} style={{...S.campo, width:'auto', padding:'9px 12px'}} onChange={e => setFMaquina(e.target.value)}>
            <option value="todas">Todos os veículos</option>
            {maquinasDoFiltro.map(m => <option key={m.id} value={m.id}>{m.codigo ? m.codigo+' · ' : ''}{m.descricao}</option>)}
          </select>
        </div>
        <span style={{fontSize:13.5, color:COR.cinza, fontWeight:600, alignSelf:'center'}}>{noPeriodo.length} registro(s)</span>
      </div>

      {/* Ações do período */}
      <div style={{display:'flex', gap:10, flexWrap:'wrap', marginBottom:18}}>
        <button onClick={() => gerarPdfTodosRegistros(noPeriodo, ini, fim, maquinas)} disabled={noPeriodo.length===0} style={{...S.botaoPrim, opacity:noPeriodo.length?1:.5}}>
          <Download size={18}/> Baixar todos os checklists
        </button>
        <button onClick={() => setMostrarExcluir(true)} disabled={noPeriodo.length===0} style={{...S.botaoSec, color:COR.vermelho, borderColor:'#FECACA', opacity:noPeriodo.length?1:.5, marginLeft:'auto'}}>
          <Trash2 size={17}/> Excluir período
        </button>
      </div>

      {/* Lista de registros */}
      {noPeriodo.length === 0 ? (
        <div style={{textAlign:'center', padding:'48px 20px', color:COR.cinza}}>
          <FileText size={40} color={COR.borda}/>
          <p style={{marginTop:12, fontWeight:600}}>Nenhum registro neste período.</p>
        </div>
      ) : (
        <div style={{display:'flex', flexDirection:'column', gap:10}}>
          {noPeriodo.map(r => {
            const aberto = expandido === r.id;
            const func = r.status === 'funcional';
            const nokCount = (r.checklist || []).filter(c => c.status === 'nok').length;
            return (
              <div key={r.id} style={{...S.card, padding:0, overflow:'hidden'}}>
                <div onClick={() => setExpandido(aberto ? null : r.id)} style={{display:'flex', alignItems:'center', gap:12, padding:'13px 16px', cursor:'pointer'}}>
                  <div style={{width:40, height:40, borderRadius:10, background: r.status==='sem_atividade'?'#F1F5F9':(func?COR.verdeBg:COR.vermelhoBg), display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                    {r.status==='sem_atividade' ? <CircleSlash size={20} color="#64748B"/> : (func ? <CheckCircle2 size={20} color={COR.verde}/> : <AlertTriangle size={20} color={COR.vermelho}/>)}
                  </div>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontSize:15, fontWeight:700, color:COR.texto}}>{r.maquinaCodigo ? r.maquinaCodigo+' · ' : ''}{r.maquinaDescricao}</div>
                    <div style={{fontSize:12.5, color:COR.cinza, marginTop:1}}>
                      {r.retroativo
                        ? <span><Clock size={11} style={{verticalAlign:-1}}/> Ref. {(r.dataRef || '').split('-').reverse().slice(0,2).join('/')} (retroativo) · {r.operador || 'sem nome'}</span>
                        : <span>{dataHoraBR(r.criadoEm)}{r.complemento ? ' (complemento)' : ''} · {r.operador || 'sem nome'}</span>}
                      {r.ajusteAdmin && <span style={{color:'#7C3AED', fontWeight:700}}> · ajuste do admin</span>}
                    </div>
                  </div>
                  <div style={{display:'flex', flexDirection:'column', gap:4, alignItems:'flex-end'}}>
                    <BadgeStatusReg registro={r}/>
                    {r.validacaoStatus === 'validada'
                      ? <Badge cor={COR.verde} bg={COR.verdeBg}><CheckCircle2 size={10}/> Validada</Badge>
                      : r.validacaoStatus === 'invalidada'
                        ? <Badge cor={COR.vermelho} bg={COR.vermelhoBg}><X size={10}/> Invalidada</Badge>
                        : <Badge cor={COR.cinza} bg="#F3F4F6"><Clock size={10}/> Pendente</Badge>}
                    {nokCount > 0 && <span style={{fontSize:11.5, color:COR.vermelho, fontWeight:700}}>{nokCount} item(ns) não OK</span>}
                  </div>
                  <ChevronDown size={18} color={COR.cinza} style={{transform: aberto?'rotate(180deg)':'none', transition:'transform .15s', flexShrink:0}}/>
                </div>

                {aberto && (
                  <div style={{borderTop:`1px solid ${COR.borda}`, padding:'14px 16px', background:'#FAFBFC'}}>
                    {r.validacaoStatus !== 'pendente' && (
                      <div style={{marginBottom:12, padding:'10px 12px', borderRadius:10, background: r.validacaoStatus==='validada'?COR.verdeBg:COR.vermelhoBg, fontSize:13}}>
                        <div style={{fontWeight:700, color: r.validacaoStatus==='validada'?'#166534':'#991B1B', display:'flex', alignItems:'center', gap:6}}>
                          {r.validacaoStatus==='validada' ? <CheckCircle2 size={14}/> : <X size={14}/>}
                          {r.validacaoStatus==='validada' ? 'Validada' : 'Invalidada'}
                          {r.validacaoPor ? ` por ${r.validacaoPor}` : ''}
                          {r.validacaoEm ? ` · ${dataHoraBR(r.validacaoEm)}` : ''}
                        </div>
                        {r.validacaoStatus==='invalidada' && r.validacaoMotivo && (
                          <div style={{marginTop:4, color:'#7F1D1D'}}><b>Motivo:</b> {r.validacaoMotivo}</div>
                        )}
                      </div>
                    )}
                    <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(140px,1fr))', gap:8, marginBottom:12, fontSize:13}}>
                      {func && <div><b>{unidadeMedidor(mapaMaquinas[r.maquinaId])}:</b> {r.horimetroNA ? 'N/A' : (r.horimetro!=null ? r.horimetro+unidadeSufixo(mapaMaquinas[r.maquinaId]) : '—')}</div>}
                      <div><b>Obra:</b> {r.obra || '—'}</div>
                      {r.indisponivelMinutos != null && <div><b>Indisponibilidade:</b> {formatarDuracao(r.indisponivelMinutos)}</div>}
                    </div>
                    {(r.checklist || []).filter(c => c.status).length > 0 && (
                      <div style={{marginBottom:12}}>
                        <div style={{fontSize:12.5, fontWeight:700, color:COR.cinza, marginBottom:6, textTransform:'uppercase'}}>Checklist</div>
                        <div style={{display:'flex', flexDirection:'column', gap:5}}>
                          {r.checklist.filter(c => c.status).map((c, i) => (
                            <div key={i} style={{display:'flex', alignItems:'center', gap:8, fontSize:13.5}}>
                              <span style={{fontWeight:700, color: c.status==='ok'?COR.verde:COR.vermelho, fontSize:12, minWidth:58}}>{c.status==='ok'?'OK':'NÃO OK'}</span>
                              <span style={{color:COR.texto}}>{c.item}</span>
                              {c.obs && <span style={{color:COR.cinza, fontStyle:'italic'}}>— {c.obs}</span>}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {r.observacao && <div style={{fontSize:13.5, marginBottom:12}}><b>Observação:</b> {r.observacao}</div>}
                    {((r.fotoUrl ? 1 : 0) + (r.fotosExtras||[]).length) > 0 && (
                      <div style={{display:'flex', gap:8, flexWrap:'wrap', marginBottom:12}}>
                        {r.fotoUrl && <a href={r.fotoUrl} target="_blank" rel="noopener"><img src={r.fotoUrl} alt="painel" style={{width:70, height:70, objectFit:'cover', borderRadius:8, border:`1px solid ${COR.borda}`}}/></a>}
                        {(r.fotosExtras||[]).map((u,i) => <a key={i} href={u} target="_blank" rel="noopener"><img src={u} alt={'f'+i} style={{width:70, height:70, objectFit:'cover', borderRadius:8, border:`1px solid ${COR.borda}`}}/></a>)}
                      </div>
                    )}
                    <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                      <button onClick={() => gerarPdfRegistro(r, mapaMaquinas[r.maquinaId] || { codigo:r.maquinaCodigo, descricao:r.maquinaDescricao, obra:r.obra, possuiHorimetro:true, tipo:'axial' })} style={{...S.botaoSec, padding:'8px 14px', fontSize:13.5}}>
                        <Download size={16}/> Baixar PDF deste registro
                      </button>
                      <button onClick={() => setEditando({ maquina: mapaMaquinas[r.maquinaId] || { id:r.maquinaId, codigo:r.maquinaCodigo, descricao:r.maquinaDescricao, obra:r.obra }, data: (r.dataRef || new Date(r.criadoEm).toISOString().slice(0,10)), registro: r })} style={{...S.botaoSec, padding:'8px 14px', fontSize:13.5}}>
                        <Edit size={16}/> Editar status
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Modal de exclusão com senha */}
      {mostrarExcluir && (
        <div style={{position:'fixed', inset:0, background:'rgba(15,23,42,.5)', zIndex:500, display:'flex', alignItems:'center', justifyContent:'center', padding:20}} onClick={() => !excluindo && setMostrarExcluir(false)}>
          <div onClick={e => e.stopPropagation()} style={{background:'#fff', width:'100%', maxWidth:420, borderRadius:16, padding:22}}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:12}}>
              <div style={{width:44, height:44, borderRadius:11, background:COR.vermelhoBg, display:'flex', alignItems:'center', justifyContent:'center'}}><Trash2 size={22} color={COR.vermelho}/></div>
              <h3 style={{margin:0, fontSize:18, fontWeight:800, color:COR.texto}}>Excluir período</h3>
            </div>
            <p style={{fontSize:14, color:COR.cinza, lineHeight:1.5, margin:'0 0 16px'}}>
              Isso vai apagar <b>{noPeriodo.length} registro(s)</b> de {ini.split('-').reverse().join('/')} a {fim.split('-').reverse().join('/')}{fObra !== 'todas' ? <> da obra <b>{fObra}</b></> : ''} e <b>todas as fotos</b> deles. Esta ação não pode ser desfeita.
            </p>
            <label style={S.rotulo}>Digite a senha do admin para confirmar</label>
            <input type="password" value={senha} autoFocus style={{...S.campo, borderColor: erroSenha?COR.vermelho:COR.borda}} onChange={e => { setSenha(e.target.value); setErroSenha(''); }} onKeyDown={e => e.key==='Enter' && confirmarExclusao()}/>
            {erroSenha && <p style={{color:COR.vermelho, fontSize:13, margin:'8px 0 0', fontWeight:600}}>{erroSenha}</p>}
            <div style={{display:'flex', gap:10, marginTop:18}}>
              <button onClick={confirmarExclusao} disabled={excluindo} style={{...S.botaoPrim, flex:1, background:COR.vermelho, opacity:excluindo?.7:1}}>{excluindo ? 'Excluindo…' : 'Excluir definitivamente'}</button>
              <button onClick={() => { setMostrarExcluir(false); setSenha(''); setErroSenha(''); }} disabled={excluindo} style={S.botaoSec}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {editando && (
        <EditorStatusDia
          maquina={editando.maquina} data={editando.data} registro={editando.registro}
          onFechar={() => setEditando(null)}
          onSalvar={async (dados) => { await onSalvarAjuste(editando, dados); setEditando(null); }}
        />
      )}
    </div>
  );
}

function BannerStatus({ online, pendentes, sincronizando, onSincronizar }) {
  if (online && pendentes === 0) return null; // tudo certo: não mostra nada
  const offline = !online;
  return (
    <div style={{
      position:'sticky', top:0, zIndex:400, width:'100%',
      background: offline ? '#92400E' : '#1E40AF', color:'#fff',
      padding:'8px 14px', fontSize:13, fontWeight:600,
      display:'flex', alignItems:'center', justifyContent:'center', gap:10,
    }}>
      {offline ? (
        <><CircleSlash size={15}/> Sem conexão — os registros serão guardados no aparelho{pendentes>0?` (${pendentes} na fila)`:''}.</>
      ) : (
        <>
          <Clock size={15}/> {pendentes} registro(s) aguardando envio.
          <button onClick={onSincronizar} disabled={sincronizando} style={{background:'rgba(255,255,255,.25)', color:'#fff', border:'none', borderRadius:7, padding:'4px 12px', fontSize:12.5, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>
            {sincronizando ? 'Enviando…' : 'Enviar agora'}
          </button>
        </>
      )}
    </div>
  );
}
