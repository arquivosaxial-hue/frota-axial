    // Captura erros globais e exibe na tela (útil pra debug em produção)
    window.addEventListener('error', function(e) {
      const overlay = document.getElementById('error-overlay');
      const msg = document.getElementById('error-message');
      if (overlay && msg) {
        overlay.style.display = 'block';
        const errInfo = (e.error && e.error.stack) || e.message || String(e);
        msg.textContent = errInfo + '\n\nArquivo: ' + (e.filename || '?') + ':' + (e.lineno || '?');
      }
      document.getElementById('boot-loader')?.classList.add('boot-hide');
    });
    window.addEventListener('unhandledrejection', function(e) {
      const overlay = document.getElementById('error-overlay');
      const msg = document.getElementById('error-message');
      if (overlay && msg) {
        overlay.style.display = 'block';
        msg.textContent = 'Promise rejeitada: ' + (e.reason && e.reason.stack || e.reason || 'desconhecido');

    });

    // Registro do Service Worker (habilita uso offline e instalação)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').then(function(reg) {
          // Detecta nova versão disponível
          reg.addEventListener('updatefound', function() {
            const novo = reg.installing;
            if (!novo) return;
            novo.addEventListener('statechange', function() {
              if (novo.state === 'installed' && navigator.serviceWorker.controller) {
                window.__novaVersaoDisponivel = true;
                window.dispatchEvent(new Event('sw-update'));
              }
            });
          });
        }).catch(function(err) { console.warn('SW falhou:', err); });
      });
    }

function LucideIcon({ name, size = 24, color = 'currentColor', strokeWidth = 2, style, ...rest }) {
  const paths = ICON_PATHS[name];
  if (!paths) {
    console.warn('Ícone não encontrado:', name);
    return null;
  }
  return React.createElement('svg', {
    xmlns: 'http://www.w3.org/2000/svg',
    width: size,
    height: size,
    viewBox: '0 0 24 24',
    fill: 'none',
    stroke: color,
    strokeWidth: strokeWidth,
    strokeLinecap: 'round',
    strokeLinejoin: 'round',
    style,
    dangerouslySetInnerHTML: { __html: paths },
    ...rest,
  });
}

// FILA OFFLINE (IndexedDB)
// Guarda registros feitos sem internet (com as fotos como blobs)
// e envia ao Supabase quando a conexão volta.
// ============================================================
const DB_NOME = 'frota-axial-offline';
const DB_STORE = 'fila';

function abrirDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NOME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(DB_STORE)) {
        db.createObjectStore(DB_STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function filaAdicionar(item) {
  const db = await abrirDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(item);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

async function filaListar() {
  const db = await abrirDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function filaRemover(id) {
  const db = await abrirDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

async function filaContar() {
  try { const itens = await filaListar(); return itens.length; }
  catch (e) { return 0; }
}

// Envia um item da fila ao Supabase (registro + upload das fotos guardadas)
async function enviarItemFila(item) {
  if (!supabaseClient) throw new Error('sem cliente');
  // 1) sobe a foto do painel (blob guardado)
  let fotoUrl = '';
  if (item.fotoBlob) {
    fotoUrl = await enviarFotoBlob(item.fotoBlob);
  }
  // 2) sobe as fotos extras (blobs)
  const fotosExtrasUrls = [];
  for (const blob of (item.fotosExtrasBlobs || [])) {
    try { const u = await enviarFotoBlob(blob); if (u) fotosExtrasUrls.push(u); }
    catch (e) { console.error('extra offline', e); }
  }
  // 3) recalcula indisponibilidade no momento do envio? Não — usa o que foi calculado offline.
  const linha = {
    ...item.linha,
    foto_url: fotoUrl,
    fotos_extras: fotosExtrasUrls,
  };
  const { error } = await supabaseClient.from('registros').insert(linha);
  if (error) throw error;
  // 4) atualiza a máquina (status/horímetro)
  if (item.maquinaUpdate && item.maquinaId) {
    await supabaseClient.from('maquinas').update(item.maquinaUpdate).eq('id', item.maquinaId);
  }
}

// Tenta enviar toda a fila. Retorna { enviados, restantes }.
let __sincronizando = false;
async function sincronizarFila() {
  if (__sincronizando || !navigator.onLine || !supabaseClient) {
    return { enviados: 0, restantes: await filaContar() };
  }
  __sincronizando = true;
  let enviados = 0;
  try {
    const itens = await filaListar();
    // ordena por data de criação para manter a ordem dos registros
    itens.sort((a, b) => new Date(a.linha.criado_em || 0) - new Date(b.linha.criado_em || 0));
    for (const item of itens) {
      try { await enviarItemFila(item); await filaRemover(item.id); enviados++; }
      catch (e) { console.error('falha ao sincronizar item', e); break; } // para na 1ª falha (provável queda de rede)
    }
  } finally { __sincronizando = false; }
  const restantes = await filaContar();
  window.dispatchEvent(new CustomEvent('fila-mudou', { detail: { restantes } }));
  return { enviados, restantes };
}

function maquinaDoBanco(l) {
  return {
    id: l.id,
    codigo: l.codigo || '',
    descricao: l.descricao || '',
    modelo: l.modelo || '',
    fabricante: l.fabricante || '',
    numeroSerie: l.numero_serie || '',
    obra: l.obra || '',
    tipo: l.tipo || 'axial',
    unidade: l.unidade || 'horas',
    empresaLocadora: l.empresa_locadora || '',
    especificacoes: (l.especificacoes && typeof l.especificacoes === 'object') ? l.especificacoes : {},
    checklistProprio: Array.isArray(l.checklist_itens) ? l.checklist_itens : null,
    possuiHorimetro: l.possui_horimetro !== false,
    horimetroInicial: Number(l.horimetro_inicial) || 0,
    horimetroAtual: Number(l.horimetro_atual) || 0,
    intervaloManutencao: Number(l.intervalo_manutencao) || 500,
    horimetroUltimaManutencao: Number(l.horimetro_ultima_manutencao) || 0,
    statusAtual: l.status_atual || 'funcional',
    ativa: l.ativa !== false,
    criadoEm: l.criado_em,
  };
}

function maquinaParaBanco(m) {
  return {
    codigo: m.codigo,
    descricao: m.descricao,
    modelo: m.modelo,
    fabricante: m.fabricante,
    numero_serie: m.numeroSerie,
    obra: m.obra,
    tipo: m.tipo,
    unidade: m.unidade || 'horas',
    empresa_locadora: m.empresaLocadora || null,
    especificacoes: m.especificacoes || {},
    checklist_itens: m.checklistProprio && m.checklistProprio.length ? m.checklistProprio : null,
    possui_horimetro: m.possuiHorimetro,
    horimetro_inicial: m.horimetroInicial,
    horimetro_atual: m.horimetroAtual,
    intervalo_manutencao: m.intervaloManutencao,
    horimetro_ultima_manutencao: m.horimetroUltimaManutencao,
    status_atual: m.statusAtual,
    ativa: m.ativa,
  };
}

// Cache local dos dados (para uso offline)
function cacheSalvar(chave, valor) {
  try { localStorage.setItem('cache_' + chave, JSON.stringify(valor)); } catch (e) {}
}
function cacheLer(chave, padrao) {
  try { const v = localStorage.getItem('cache_' + chave); return v ? JSON.parse(v) : padrao; }
  catch (e) { return padrao; }
}

// Registros feitos NESTE aparelho hoje (para a tela inicial do operador)
function meusRegistrosHoje() {
  const hoje = new Date().toISOString().slice(0,10);
  const todos = cacheLer('meus_registros', []);
  // mantém só os de hoje (limpa os antigos)
  const doDia = todos.filter(r => (r.dia === hoje));
  if (doDia.length !== todos.length) { try { localStorage.setItem('cache_meus_registros', JSON.stringify(doDia)); } catch(e){} }
  return doDia;
}
function adicionarMeuRegistro(item) {
  const hoje = new Date().toISOString().slice(0,10);
  const atuais = meusRegistrosHoje();
  atuais.unshift({ ...item, dia: hoje });
  try { localStorage.setItem('cache_meus_registros', JSON.stringify(atuais.slice(0, 50))); } catch(e){}
}

// Promise com tempo limite — evita ficar "Carregando…" pra sempre offline
function comTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms)),
  ]);
}

async function listarMaquinas() {
  if (!supabaseClient || !navigator.onLine) return cacheLer('maquinas', []);
  try {
    const { data, error } = await comTimeout(
      supabaseClient.from('maquinas').select('*').order('descricao', { ascending: true }), 8000);
    if (error) throw error;
    const lista = (data || []).map(maquinaDoBanco);
    cacheSalvar('maquinas', lista);
    return lista;
  } catch (e) { console.warn('listarMaquinas offline/falha', e); return cacheLer('maquinas', []); }
}

async function listarObras() {
  if (!supabaseClient || !navigator.onLine) return cacheLer('obras', []);
  try {
    const { data, error } = await comTimeout(
      supabaseClient.from('obras').select('*').order('nome', { ascending: true }), 8000);
    if (error) throw error;
    const lista = (data || []).map(o => ({ id: o.id, nome: o.nome, ativa: o.ativa !== false }));
    cacheSalvar('obras', lista);
    return lista;
  } catch (e) { console.warn('listarObras offline/falha', e); return cacheLer('obras', []); }
}

// Semeia tabelas vazias na primeira execução
async function semearSeVazio() {
  if (!supabaseClient) return;
  try {
    const obras = await listarObras();
    if (obras.length === 0) {
      await supabaseClient.from('obras').insert(
        OBRAS_SEMENTE.map(nome => ({ nome, ativa: true }))
      );
    }
    const maqs = await listarMaquinas();
    if (maqs.length === 0) {
      await supabaseClient.from('maquinas').insert(
        MAQUINAS_SEMENTE.map(m => maquinaParaBanco({
          ...m,
          horimetroAtual: m.horimetroInicial,
          horimetroUltimaManutencao: 0,
          statusAtual: 'funcional',
          ativa: true,
        }))
      );
    }
  } catch (e) { console.error('semear', e); }
}

// Calcula o estado da manutenção (semáforo) p/ máquinas axial
// Retorna { cor, rotulo, restante, vencido }
function calcularManutencao(m) {
  if (m.tipo !== 'axial' || !m.possuiHorimetro) {
    return { cor: COR.cinza, rotulo: 'N/A', restante: null, vencido: false };
  }
  const desdeUltima = m.horimetroAtual - (m.horimetroUltimaManutencao || 0);
  const intervalo = m.intervaloManutencao || 500;
  const restante = Math.round(intervalo - desdeUltima);
  if (restante <= 0)         return { cor: COR.vermelho, rotulo: 'Vencida',  restante, vencido: true };
  if (restante <= intervalo * 0.15) return { cor: COR.amarelo, rotulo: 'Próxima', restante, vencido: false };
  return { cor: COR.verde, rotulo: 'Em dia', restante, vencido: false };
}

// Rótulos conforme a unidade da máquina (horas/km)
function unidadeSufixo(m) { return (m && m.unidade === 'km') ? 'km' : 'h'; }
function unidadeMedidor(m) { return (m && m.unidade === 'km') ? 'Hodômetro' : 'Horímetro'; }
function unidadeTrabalho(m) { return (m && m.unidade === 'km') ? 'Km rodados' : 'Horas trabalhadas'; }
// Nome da empresa: locada mostra a empresa locadora; própria mostra "Axial"
function empresaDaMaquina(m) {
  if (!m) return '—';
  if (m.tipo === 'prestador') return m.empresaLocadora || 'Locada (sem empresa)';
  return 'Axial';
}

// Lê/grava a configuração do checklist na tabela configuracoes
// Resolve o checklist efetivo de uma máquina: o próprio (se customizado), senão o padrão global
function checklistDaMaquina(maquina, padrao) {
  if (maquina && Array.isArray(maquina.checklistProprio) && maquina.checklistProprio.length) {
    return maquina.checklistProprio;
  }
  return padrao || CHECKLIST_PADRAO;
}

// Quantos dias para trás o operador pode recuperar um checklist atrasado
const DIAS_RETROATIVO = 30;
// Nunca recupera dias anteriores a esta data
const DATA_INICIO_RETROATIVO = '2026-06-01';

// Dias (YYYY-MM-DD) sem checklist para a máquina: a partir de 01/06,
// dentro dos últimos 30 dias, SEM contar hoje, e que ainda não tenham registro.
function diasPendentesMaquina(maquina, registros) {
  if (!maquina) return [];
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diasComRegistro = new Set(
    registros
      .filter(r => r.maquinaId === maquina.id)
      .map(r => (r.dataRef || new Date(r.criadoEm).toISOString().slice(0,10)))
  );
  const pendentes = [];
  for (let i = 1; i <= DIAS_RETROATIVO; i++) {     // i=1 => ontem; nunca inclui hoje
    const d = new Date(hoje); d.setDate(d.getDate() - i);
    const iso = d.toISOString().slice(0,10);
    if (iso < DATA_INICIO_RETROATIVO) continue;    // nada antes de 01/06
    if (!diasComRegistro.has(iso)) pendentes.push(iso);
  }
  return pendentes.sort();                          // mais antigo primeiro
}

async function lerChecklistConfig() {
  if (!supabaseClient || !navigator.onLine) return cacheLer('checklist', CHECKLIST_PADRAO);
  try {
    const { data, error } = await comTimeout(
      supabaseClient.from('configuracoes').select('valor').eq('chave', 'checklist_itens').maybeSingle(), 8000);
    if (error) throw error;
    const itens = (data && Array.isArray(data.valor) && data.valor.length) ? data.valor : CHECKLIST_PADRAO;
    cacheSalvar('checklist', itens);
    return itens;
  } catch (e) { console.warn('lerChecklistConfig offline/falha', e); return cacheLer('checklist', CHECKLIST_PADRAO); }
}

  if (!supabaseClient) return;

    .upsert({ chave: 'checklist_itens', valor: itens, atualizado_em: new Date().toISOString() }, { onConflict: 'chave' });
}

// Comprime uma imagem (File/Blob) para no máx ~1280px no maior lado, JPEG qualidade 0.7.
// Reduz drasticamente o tamanho (ex: 8MB -> ~300KB), mantendo o horímetro legível.
// Se algo falhar, devolve o arquivo original (nunca trava o registro).
function comprimirImagem(arquivo, maxLado = 1280, qualidade = 0.7) {
  return new Promise((resolve) => {
    try {
      if (!arquivo || !arquivo.type || !arquivo.type.startsWith('image/')) return resolve(arquivo);
      const url = URL.createObjectURL(arquivo);
      const img = new Image();
      img.onload = () => {
        try {
          let { width, height } = img;
          if (width > maxLado || height > maxLado) {
            if (width >= height) { height = Math.round(height * maxLado / width); width = maxLado; }
            else { width = Math.round(width * maxLado / height); height = maxLado; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          URL.revokeObjectURL(url);
          canvas.toBlob((blob) => {
            if (!blob) return resolve(arquivo);
            // mantém um "name" amigável p/ extensão
            try { blob.name = (arquivo.name || 'foto').replace(/\.[^.]+$/, '') + '.jpg'; } catch (e) {}
            resolve(blob);
          }, 'image/jpeg', qualidade);
        } catch (e) { URL.revokeObjectURL(url); resolve(arquivo); }
      };
      img.onerror = () => { URL.revokeObjectURL(url); resolve(arquivo); };
      img.src = url;
    } catch (e) { resolve(arquivo); }
  });
}

// Faz upload da foto do painel e devolve a URL pública
async function enviarFoto(arquivo) {
  if (!supabaseClient || !arquivo) return '';
  const ext = (arquivo.name && arquivo.name.split('.').pop()) || 'jpg';
  const nome = `painel/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error } = await supabaseClient.storage.from('fotos').upload(nome, arquivo, { upsert: false });
  if (error) { console.error('enviarFoto', error); throw error; }
  const { data } = supabaseClient.storage.from('fotos').getPublicUrl(nome);
  return data.publicUrl;
}

// Sobe um Blob (usado na sincronização offline, onde guardamos blobs)
async function enviarFotoBlob(blob) {
  if (!supabaseClient || !blob) return '';
  const tipo = blob.type || 'image/jpeg';
  const ext = tipo.includes('png') ? 'png' : (tipo.includes('webp') ? 'webp' : 'jpg');
  const nome = `painel/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error } = await supabaseClient.storage.from('fotos').upload(nome, blob, { upsert: false, contentType: tipo });
  if (error) { console.error('enviarFotoBlob', error); throw error; }
  const { data } = supabaseClient.storage.from('fotos').getPublicUrl(nome);
  return data.publicUrl;
}

// Extrai o caminho interno do arquivo a partir da URL pública do Storage
function caminhoDaFotoUrl(url) {
  if (!url) return null;
  const marca = '/object/public/fotos/';
  const i = url.indexOf(marca);
  if (i === -1) return null;
  return decodeURIComponent(url.slice(i + marca.length));
}

// Exclui todos os registros de um período + as fotos no Storage
async function excluirRegistrosPeriodo(registros, ini, fim, obra) {
  if (!supabaseClient) return { apagados: 0 };
  const iniMs = ini ? new Date(ini + 'T00:00:00').getTime() : -Infinity;
  const fimMs = fim ? new Date(fim + 'T23:59:59').getTime() : Infinity;
  const alvo = registros.filter(r => {
    const t = new Date(r.criadoEm).getTime();
    if (t < iniMs || t > fimMs) return false;
    if (obra && obra !== 'todas' && r.obra !== obra) return false;
    return true;
  });
  if (alvo.length === 0) return { apagados: 0 };

  // 1) junta os caminhos de todas as fotos (painel + extras)
  const caminhos = [];
  for (const r of alvo) {
    const p = caminhoDaFotoUrl(r.fotoUrl); if (p) caminhos.push(p);
    for (const u of (r.fotosExtras || [])) { const c = caminhoDaFotoUrl(u); if (c) caminhos.push(c); }
  }
  if (caminhos.length) {
    try { await supabaseClient.storage.from('fotos').remove(caminhos); }
    catch (e) { console.error('remover fotos', e); }
  }

  // 2) apaga os registros (em lotes por id)
  const ids = alvo.map(r => r.id);
  const { error } = await supabaseClient.from('registros').delete().in('id', ids);
  if (error) { console.error('excluir registros', error); throw error; }
  return { apagados: alvo.length };
}

// Lista máquinas que precisam de atenção de manutenção (próxima ou vencida)
function maquinasParaRevisao(maquinas) {
  return maquinas
    .filter(m => m.ativa)
    .map(m => ({ m, mn: calcularManutencao(m) }))
    .filter(x => x.mn.rotulo === 'Próxima' || x.mn.rotulo === 'Vencida')
    .sort((a, b) => (a.mn.restante ?? 0) - (b.mn.restante ?? 0));
}

// Formata minutos como "Xh Ymin"
function formatarDuracao(min) {
  if (min == null) return '—';
  const h = Math.floor(min / 60);
  const m = Math.round(min % 60);
  if (h === 0) return `${m} min`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}min`;
}

function dataHoraBR(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

// Carrega uma imagem (URL) como dataURL para embutir no PDF. Retorna '' se falhar.
async function imagemParaDataURL(url) {
  try {
    const resp = await fetch(url);
    const blob = await resp.blob();
    return await new Promise((res) => {
      const r = new FileReader();
      r.onloadend = () => res(r.result);
      r.onerror = () => res('');
      r.readAsDataURL(blob);
    });
  } catch (e) { console.error('imagemParaDataURL', e); return ''; }
}

// Ficha técnica da máquina (PDF)
function gerarPdfFichaMaquina(m) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210; let y = 0;

  doc.setFillColor(27, 58, 92); doc.rect(0, 0, W, 26, 'F');
  doc.setTextColor(255); doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
  doc.text('Ficha Técnica da Máquina', 14, 12);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
  doc.text('Construtora Axial — Gestão de Frota', 14, 19);
  desenharLogoPdf(doc, W);
  y = 36;

  function secao(titulo) {
    if (y > 270) { doc.addPage(); y = 20; }
    doc.setFont('helvetica', 'bold'); doc.setFontSize(12); doc.setTextColor(27,58,92);
    doc.text(titulo, 14, y); y += 2;
    doc.setDrawColor(200); doc.line(14, y, W-14, y); y += 6;
  }
  function linha(rotulo, valor) {
    if (y > 282) { doc.addPage(); y = 20; }
    doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5); doc.setTextColor(90);
    doc.text(String(rotulo).toUpperCase(), 14, y);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10.5); doc.setTextColor(30);
    const v = (valor === null || valor === undefined || valor === '') ? '—' : String(valor);
    doc.text(doc.splitTextToSize(v, 120), 70, y);
    y += 7;
  }

  const suf = m.unidade === 'km' ? 'km' : 'h';
  const tipoTxt = m.tipo === 'prestador' ? 'Prestador (locada)' : 'Axial (própria)';

  secao('Identificação');
  linha('Código', m.codigo);
  linha('Descrição', m.descricao);
  linha('Tipo', tipoTxt);
  if (m.tipo === 'prestador') linha('Empresa locadora', m.empresaLocadora);
  linha('Fabricante', m.fabricante);
  linha('Modelo', m.modelo);
  linha('Número de série', m.numeroSerie);
  linha('Obra vinculada', m.obra);

  secao('Medição e manutenção');
  linha('Tipo de medição', m.unidade === 'km' ? 'Hodômetro (km)' : 'Horímetro (horas)');
  linha('Possui medidor', m.possuiHorimetro ? 'Sim' : 'Não');
  if (m.possuiHorimetro) {
    linha(`Medidor inicial`, m.horimetroInicial != null ? m.horimetroInicial + ' ' + suf : '—');
    linha(`Medidor atual`, m.horimetroAtual != null ? m.horimetroAtual + ' ' + suf : '—');
    if (m.tipo !== 'prestador') {
      linha('Intervalo de manutenção', m.intervaloManutencao != null ? m.intervaloManutencao + ' ' + suf : '—');
      linha('Medidor na última revisão', m.horimetroUltimaManutencao != null ? m.horimetroUltimaManutencao + ' ' + suf : '—');
    }
  }

  // Especificações (óleos e filtros) — só Axial
  const esp = m.especificacoes || {};
  const campos = [
    ['oleoMotor','Óleo do motor utilizado'], ['oleoHidraulico','Óleo hidráulico utilizado'],
    ['filtroAr1','Filtro de ar 1'], ['filtroAr2','Filtro de ar 2'],
    ['filtroComb1','Filtro de combustível 1'], ['filtroComb2','Filtro de combustível 2'],
    ['separador','Separador'], ['filtroOleo1','Filtro de óleo 1'], ['filtroOleo2','Filtro de óleo 2'],
  ];
  const temEsp = campos.some(([k]) => esp[k]);
  if (m.tipo !== 'prestador' && temEsp) {
    secao('Especificações (óleos e filtros)');
    for (const [k, rot] of campos) if (esp[k]) linha(rot, esp[k]);
  }

  doc.setFontSize(8.5); doc.setTextColor(150); doc.setFont('helvetica','normal');
  doc.text(`Emitido em ${new Date().toLocaleString('pt-BR')}`, 14, 290);

  const nomeArq = (m.codigo || m.descricao || 'maquina').replace(/[^\w-]+/g,'_');
  doc.save(`ficha_${nomeArq}.pdf`);
}

// Gera e baixa o PDF de UM registro (lado do operador)
// Desenha a logo da Axial no canto direito do cabeçalho azul do PDF
function desenharLogoPdf(doc, W) {
  try {
    // logo 720x301 -> proporção ~2.39; cartão branco um pouco maior que a imagem
    const lw = 50, lh = lw * 301 / 720;
    const x = W - lw - 10, yTopo = (26 - lh) / 2;
    doc.setFillColor(255,255,255); doc.roundedRect(x-3, yTopo-2, lw+6, lh+4, 1.5, 1.5, 'F');
    doc.addImage(LOGO_AXIAL, 'JPEG', x, yTopo, lw, lh);
  } catch (e) { /* se falhar, segue sem logo */ }
}

// Desenha uma tabela "Motivos da parada" (data / motivo / causa) para os registros de uma máquina.
// Retorna o novo y. Se não houver paradas, não desenha nada.
function tabelaMotivosPdf(doc, regsMaquina, y, W, addPageCb) {
  const paradas = (regsMaquina || [])
    .filter(r => r.status === 'nao_funcional')
    .sort((a,b) => new Date(a.criadoEm) - new Date(b.criadoEm));
  if (paradas.length === 0) return y;

  const H = 297;
  if (y + 18 > H - 12) { addPageCb && addPageCb(); y = 34; }
  doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5); doc.setTextColor(60);
  doc.text('MOTIVOS DA PARADA', 14, y); y += 5;

  const colX = [14, 46, 110];
  doc.setFillColor(240,242,245); doc.rect(12, y-4, W-24, 6.5, 'F');
  doc.setFontSize(8.5); doc.setTextColor(70);
  doc.text('DATA', colX[0], y); doc.text('MOTIVO', colX[1], y); doc.text('CAUSA', colX[2], y);
  y += 6;
  doc.setFont('helvetica', 'normal'); doc.setTextColor(40);
  for (const p of paradas) {
    if (y > H - 14) { addPageCb && addPageCb(); y = 34; }
    const dia = (p.dataRef || new Date(p.criadoEm).toISOString().slice(0,10)).split('-').reverse().slice(0,2).join('/');
    const motivo = p.motivoParada || '—';
    const causa = (p.observacao && p.observacao.trim()) ? p.observacao.trim() : '—';
    doc.text(dia, colX[0], y);
    doc.text(doc.splitTextToSize(motivo, 60)[0], colX[1], y);
    const causaLinhas = doc.splitTextToSize(causa, W - colX[2] - 14);
    doc.text(causaLinhas[0], colX[2], y);
    y += 5.5;
    doc.setDrawColor(235); doc.line(12, y-2, W-12, y-2);
  }
  return y + 4;
}

// Calcula o resumo por máquina dentro de um período [ini, fim]
// Status de um dia a partir dos seus registros (regra das 14h).
// regs = registros de UMA máquina em UM dia. Retorna 'funcional' | 'nao_funcional' | null.
// Regra: se o primeiro registro do dia (manhã) foi funcional E o último registro
// do dia foi feito após as 14h, o dia conta como funcional (a máquina trabalhou),
// mesmo que o último esteja marcado como não funcional. Caso contrário, vale o
// status do último registro do dia.
function statusDoDia(regs) {
  if (!regs || regs.length === 0) return null;
  const ord = [...regs].sort((a,b) => new Date(a.criadoEm) - new Date(b.criadoEm));
  const primeiro = ord[0];
  const ultimo = ord[ord.length - 1];
  // se há qualquer registro de atividade (funcional/parado), ele prevalece sobre "sem atividade"
  const comAtividade = ord.filter(r => r.status === 'funcional' || r.status === 'nao_funcional');
  if (comAtividade.length === 0) {
    // só registros de "sem atividade"
    return ultimo.status === 'sem_atividade' ? 'sem_atividade' : null;
  }
  const primeiroAt = comAtividade[0];
  const ultimoAt = comAtividade[comAtividade.length - 1];
  const horaUltimo = new Date(ultimoAt.criadoEm).getHours();
  if (primeiroAt.status === 'funcional' && horaUltimo >= 14) return 'funcional';
  return ultimoAt.status === 'funcional' ? 'funcional' : 'nao_funcional';
}

// Badge visual do status de um registro (funcional / não funcional / sem atividade)
function BadgeStatusReg({ registro }) {
  if (registro.status === 'sem_atividade') return <Badge cor="#475569" bg="#F1F5F9"><CircleSlash size={11}/> Sem atividade</Badge>;
  if (registro.status === 'funcional') return <Badge cor={COR.verde} bg={COR.verdeBg}>Funcional</Badge>;
  return <Badge cor={COR.vermelho} bg={COR.vermelhoBg}>{registro.motivoParada || 'Parada'}</Badge>;
}

// Retorna lista de { maquina, dias:{funcionando,parado,comRegistro}, horas, paradoMin, motivos:{}, disponibilidade }
function calcularResumoPeriodo(registros, maquinas, ini, fim) {
  const iniMs = ini ? new Date(ini + 'T00:00:00').getTime() : -Infinity;
  const fimMs = fim ? new Date(fim + 'T23:59:59').getTime() : Infinity;
  const noPeriodo = registros.filter(r => {
    const t = new Date(r.criadoEm).getTime();
    return t >= iniMs && t <= fimMs;
  });

  const porMaquina = {};
  for (const m of maquinas) {
    porMaquina[m.id] = {
      maquina: m,
      diasFunc: new Set(), diasParado: new Set(),
      horasTrabalhadas: 0, paradoMin: 0, trabalhoPorDia: {},
      motivos: {}, registros: [],
    };
  }

  // agrupa registros por máquina e por dia
  const cron = [...noPeriodo].sort((a,b) => new Date(a.criadoEm) - new Date(b.criadoEm));
  const porMaqDia = {}; // maquinaId -> { dia -> [registros] }
  for (const r of cron) {
    const bucket = porMaquina[r.maquinaId];
    if (!bucket) continue;
    bucket.registros.push(r);
    const dia = r.dataRef || new Date(r.criadoEm).toISOString().slice(0,10);
    (porMaqDia[r.maquinaId] = porMaqDia[r.maquinaId] || {});
    (porMaqDia[r.maquinaId][dia] = porMaqDia[r.maquinaId][dia] || []).push(r);
  }

  // status de cada dia (regra das 14h) + indisponibilidade
  for (const maqId in porMaqDia) {
    const bucket = porMaquina[maqId];
    for (const dia in porMaqDia[maqId]) {
      const regsDia = porMaqDia[maqId][dia];
      const st = statusDoDia(regsDia);
      if (st === 'funcional') bucket.diasFunc.add(dia);
      else if (st === 'nao_funcional') {
        bucket.diasParado.add(dia);
        // motivo: usa o do último registro não funcional do dia
        const ultNF = [...regsDia].reverse().find(r => r.status !== 'funcional');
        if (ultNF) bucket.motivos[ultNF.motivoParada] = (bucket.motivos[ultNF.motivoParada] || 0) + 1;
      }
      for (const r of regsDia) if (r.indisponivelMinutos != null) bucket.paradoMin += r.indisponivelMinutos;
    }
  }

  // km/horas trabalhados: usa a PRIMEIRA leitura de cada dia (ignora complementos),
  // creditando a diferença ao dia da leitura anterior.
  for (const maqId in porMaqDia) {
    const bucket = porMaquina[maqId];
    const dias = Object.keys(porMaqDia[maqId]).sort();
    let leituraAnterior = null; // { valor, dia }
    for (const dia of dias) {
      const regsDia = porMaqDia[maqId][dia];
      // leitura do dia = primeiro registro funcional NÃO-complemento com horímetro
      const base = regsDia.find(r => r.status === 'funcional' && !r.complemento && r.horimetro != null)
                || regsDia.find(r => r.status === 'funcional' && r.horimetro != null);
      if (!base) continue;
      if (leituraAnterior != null) {
        const dif = base.horimetro - leituraAnterior.valor;
        if (dif > 0) {
          bucket.horasTrabalhadas += dif;
          bucket.trabalhoPorDia[leituraAnterior.dia] = (bucket.trabalhoPorDia[leituraAnterior.dia] || 0) + dif;
        }
      }
      leituraAnterior = { valor: base.horimetro, dia };
    }
  }

  return Object.values(porMaquina)
    .filter(b => b.registros.length > 0)
    .map(b => {
      const df = b.diasFunc.size, dp = b.diasParado.size;
      const totalDias = df + dp;
      const disponibilidade = totalDias > 0 ? Math.round((df / totalDias) * 100) : null;
      return {
        maquina: b.maquina,
        diasFuncionando: df,
        diasParado: dp,
        horasTrabalhadas: Math.round(b.horasTrabalhadas),
        paradoMin: b.paradoMin,
        motivos: b.motivos,
        disponibilidade,
        registros: b.registros,
      };
    });
}

// Lista, por máquina ativa, os dias do período SEM nenhum registro
function diasSemRegistro(registros, maquinas, ini, fim) {
  if (!ini || !fim) return [];
  const dias = [];
  const d0 = new Date(ini + 'T00:00:00');
  const d1 = new Date(fim + 'T00:00:00');
  for (let d = new Date(d0); d <= d1; d.setDate(d.getDate() + 1)) {
    dias.push(d.toISOString().slice(0,10));
  }
  // dias com registro por máquina
  const comRegistro = {};
  for (const r of registros) {
    const dia = new Date(r.criadoEm).toISOString().slice(0,10);
    if (dia < ini || dia > fim) continue;
    (comRegistro[r.maquinaId] = comRegistro[r.maquinaId] || new Set()).add(dia);
  }
  return maquinas.filter(m => m.ativa).map(m => {
    const feitos = comRegistro[m.id] || new Set();
    const faltantes = dias.filter(dia => !feitos.has(dia));
    return { maquina: m, faltantes, totalDias: dias.length };
  }).filter(x => x.faltantes.length > 0);
}

// Gera e baixa o PDF do admin (todos os checklists do período + resumo)
// PDF com o calendário (verde/vermelho/cinza) de cada máquina + resumo
function gerarPdfCalendarios(maquinasLista, registros, resumo, ini, fim) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, H = 297; let y = 0;
  const resumoPorId = {}; for (const r of resumo) resumoPorId[r.maquina.id] = r;

  // cabeçalho
  function cabecalho() {
    doc.setFillColor(27, 58, 92); doc.rect(0, 0, W, 26, 'F');
    doc.setTextColor(255); doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
    doc.text('Calendário de Operação', 14, 12);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
    const periodoTxt = (ini || fim) ? `Período: ${ini ? ini.split('-').reverse().join('/') : 'início'} a ${fim ? fim.split('-').reverse().join('/') : 'hoje'}` : 'Todos os registros';
    doc.text('Construtora Axial — ' + periodoTxt, 14, 19);
    desenharLogoPdf(doc, W);
  }
  cabecalho(); y = 34;

  // legenda
  function legenda(yy) {
    const itens = [['Funcional', [34,197,94]], ['Não funcional', [239,68,68]], ['Sem atividade', [100,116,139]], ['Sem checklist', [226,232,240]]];
    let x = 14;
    doc.setFontSize(8.5); doc.setFont('helvetica', 'normal');
    for (const [txt, cor] of itens) {
      doc.setFillColor(cor[0], cor[1], cor[2]); doc.roundedRect(x, yy-3.2, 4, 4, 0.6, 0.6, 'F');
      doc.setTextColor(80); doc.text(txt, x+5.5, yy);
      x += doc.getTextWidth(txt) + 14;
    }
  }

  // meses do período
  const d0 = new Date((ini || fim) + 'T00:00:00');
  const d1 = new Date((fim || ini) + 'T00:00:00');
  const meses = [];
  let cur = new Date(d0.getFullYear(), d0.getMonth(), 1);
  while (cur <= d1) { meses.push(new Date(cur)); cur.setMonth(cur.getMonth()+1); }
  const nomesMes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const diasSemana = ['D','S','T','Q','Q','S','S'];

  for (const maquina of maquinasLista) {
    // status por dia desta máquina
    const porDia = {};
    for (const r of registros) {
      if (r.maquinaId !== maquina.id) continue;
      const dia = r.dataRef || new Date(r.criadoEm).toISOString().slice(0,10);
      (porDia[dia] = porDia[dia] || []).push(r);
    }
    const stPorDia = {}; for (const dia in porDia) stPorDia[dia] = statusDoDia(porDia[dia]);

    // calcula altura necessária e quebra página se preciso
    const alturaBloco = 22 + Math.ceil(meses.length / 3) * 44 + 14;
    if (y + alturaBloco > H - 12) { doc.addPage(); cabecalho(); y = 34; }

    // título da máquina
    // empresa (fornecedor) em destaque no início
    const empresaTxt = maquina.tipo === 'prestador' ? (maquina.empresaLocadora || 'Locada (sem empresa)') : 'Axial (própria)';
    doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(124, 58, 237);
    doc.text(empresaTxt.toUpperCase(), 14, y);
    y += 6;
    doc.setFont('helvetica', 'bold'); doc.setFontSize(12); doc.setTextColor(27, 58, 92);
    doc.text(`${maquina.codigo ? maquina.codigo + ' · ' : ''}${maquina.descricao}`, 14, y);
    y += 5;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(110);
    doc.text(`${maquina.obra || 'Sem obra'}`, 14, y);
    y += 5;
    legenda(y); y += 6;

    // grade de meses (3 por linha)
    const colW = 60, mesH = 44;
    let col = 0, xBase = 14, yLinha = y;
    for (const mes of meses) {
      if (col === 3) { col = 0; yLinha += mesH; }
      const x = xBase + col * colW;
      const ano = mes.getFullYear(), m = mes.getMonth();
      doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(40);
      doc.text(`${nomesMes[m]} ${ano}`, x, yLinha);
      // cabeçalho dias da semana
      const cell = 7, gap = 0.8;
      doc.setFont('helvetica', 'normal'); doc.setFontSize(6.5); doc.setTextColor(150);
      for (let i = 0; i < 7; i++) doc.text(diasSemana[i], x + i*(cell+gap) + cell/2, yLinha+4, { align:'center' });
      // dias
      const primeiroDiaSemana = new Date(ano, m, 1).getDay();
      const totalDias = new Date(ano, m+1, 0).getDate();
      let celIdx = primeiroDiaSemana;
      for (let dia = 1; dia <= totalDias; dia++) {
        const linha = Math.floor(celIdx / 7), coluna = celIdx % 7;
        const cx = x + coluna*(cell+gap);
        const cy = yLinha + 6 + linha*(cell+gap);
        const iso = `${ano}-${String(m+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
        const dentro = (!ini || iso >= ini) && (!fim || iso <= fim);
        let cor = [238,241,244]; // cinza
        if (dentro) {
          const st = stPorDia[iso];
          if (st === 'funcional') cor = [34,197,94];
          else if (st === 'nao_funcional') cor = [239,68,68];
          else if (st === 'sem_atividade') cor = [100,116,139];
        } else { cor = [248,250,252]; }
        doc.setFillColor(cor[0], cor[1], cor[2]);
        doc.roundedRect(cx, cy, cell, cell, 1, 1, 'F');
        // número do dia
        const claro = (cor[0]+cor[1]+cor[2]) > 600;
        doc.setTextColor(claro ? 150 : 255); doc.setFontSize(5.5);
        doc.text(String(dia), cx + cell/2, cy + cell/2 + 1.6, { align:'center' });
        celIdx++;
      }
      col++;
    }
    y = yLinha + mesH;

    // resumo embaixo
    const R = resumoPorId[maquina.id];
    doc.setDrawColor(225); doc.line(14, y-2, W-14, y-2);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(60);
    if (R) {
      const suf = maquina.unidade === 'km' ? 'km' : 'h';
      const trabalho = maquina.possuiHorimetro ? ` · ${R.horasTrabalhadas}${suf} ${maquina.unidade==='km'?'rodados':'trabalhados'}` : '';
      doc.text(`Dias funcionando: ${R.diasFuncionando}   |   Dias parado: ${R.diasParado}${trabalho}   |   Disponibilidade: ${R.disponibilidade != null ? R.disponibilidade+'%' : '—'}`, 14, y+3);
    } else {
      doc.setTextColor(150); doc.text('Sem registros no período.', 14, y+3);
    }
    y += 12;

    // tabela de motivos da parada desta máquina (no período)
    y = tabelaMotivosPdf(doc, registros.filter(r => r.maquinaId === maquina.id), y, W, () => { doc.addPage(); cabecalho(); });
  }

  doc.save(`calendario_${new Date().toISOString().slice(0,10)}.pdf`);
}

function gerarPdfPeriodo(resumo, registrosPeriodo, ini, fim) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210; let y = 0;

  doc.setFillColor(27, 58, 92); doc.rect(0, 0, W, 26, 'F');
  doc.setTextColor(255); doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
  doc.text('Relatório de Frota', 14, 12);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
  const periodoTxt = (ini || fim) ? `Período: ${ini ? ini.split('-').reverse().join('/') : 'início'} a ${fim ? fim.split('-').reverse().join('/') : 'hoje'}` : 'Todos os registros';
  doc.text('Construtora Axial — ' + periodoTxt, 14, 19);
  desenharLogoPdf(doc, W);
  y = 34;

  // Resumo por máquina
  doc.setTextColor(30); doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
  doc.text('Resumo por máquina', 14, y); y += 8;

  doc.setFontSize(8.5);
  const head = ['Máquina', 'Dias func.', 'Dias parado', 'Trabalho', 'Tempo parado', 'Disponib.'];
  const colX = [14, 78, 100, 124, 146, 178];
  doc.setFont('helvetica', 'bold'); doc.setFillColor(240,242,245); doc.rect(12, y-5, W-24, 7, 'F');
  head.forEach((h,i) => doc.text(h, colX[i], y)); y += 7;
  doc.setFont('helvetica', 'normal');
  for (const r of resumo) {
    if (y > 272) { doc.addPage(); y = 20; }
    // fornecedor (empresa) em destaque acima do nome
    const empresaTxt = r.maquina.tipo === 'prestador' ? (r.maquina.empresaLocadora || 'Locada (sem empresa)') : 'Axial (própria)';
    doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(124, 58, 237);
    doc.text(empresaTxt.toUpperCase(), colX[0], y);
    doc.setTextColor(30); doc.setFontSize(8.5); doc.setFont('helvetica', 'normal');
    y += 4.5;
    const nome = `${r.maquina.codigo ? r.maquina.codigo+' ' : ''}${r.maquina.descricao}`;
    doc.text(doc.splitTextToSize(nome, 60)[0], colX[0], y);
    doc.text(String(r.diasFuncionando), colX[1], y);
    doc.text(String(r.diasParado), colX[2], y);
    doc.text(r.maquina.possuiHorimetro ? String(r.horasTrabalhadas)+unidadeSufixo(r.maquina) : '—', colX[3], y);
    doc.text(formatarDuracao(r.paradoMin || 0), colX[4], y);
    doc.text(r.disponibilidade != null ? r.disponibilidade+'%' : '—', colX[5], y);
    y += 5;
    doc.setDrawColor(235); doc.line(12, y-1.5, W-12, y-1.5);
    y += 2;
  }

  // Paradas por máquina (data / motivo / causa)
  y += 4; if (y > 250) { doc.addPage(); y = 20; }
  const maquinasComParada = resumo
    .map(r => r.maquina)
    .filter(m => registrosPeriodo.some(r => r.maquinaId === m.id && r.status === 'nao_funcional'));
  if (maquinasComParada.length) {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(13); doc.setTextColor(30);
    doc.text('Paradas por máquina', 14, y); y += 8;
    for (const m of maquinasComParada) {
      if (y > 255) { doc.addPage(); y = 20; }
      doc.setFont('helvetica', 'bold'); doc.setFontSize(10.5); doc.setTextColor(27,58,92);
      doc.text(`${m.codigo ? m.codigo+' · ' : ''}${m.descricao}`, 14, y); y += 5;
      y = tabelaMotivosPdf(doc, registrosPeriodo.filter(r => r.maquinaId === m.id), y, W, () => { doc.addPage(); });
      y += 2;
    }
  }

  // Detalhe dos registros
  doc.addPage(); y = 20;
  doc.setFont('helvetica', 'bold'); doc.setFontSize(13); doc.text('Registros detalhados', 14, y); y += 8;
  doc.setFontSize(9.5);
  const cron = [...registrosPeriodo].sort((a,b) => new Date(b.criadoEm) - new Date(a.criadoEm));
  for (const r of cron) {
    if (y > 270) { doc.addPage(); y = 20; }
    doc.setFont('helvetica', 'bold'); doc.setTextColor(30);
    doc.text(`${dataHoraBR(r.criadoEm)} — ${r.maquinaCodigo ? r.maquinaCodigo+' ' : ''}${r.maquinaDescricao}`, 14, y); y += 5;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    const st = r.status === 'funcional'
      ? `Funcional · ${r.horimetroNA ? 'horímetro N/A' : (r.horimetro!=null ? r.horimetro+'h' : 's/ horímetro')}`
      : `NÃO FUNCIONAL · ${r.motivoParada}`;
    doc.setTextColor(r.status==='funcional'?22:200, r.status==='funcional'?120:40, 40);
    doc.text(st, 16, y); doc.setTextColor(80);
    doc.text(`Operador: ${r.operador || '—'}`, 120, y); y += 5;
    if (r.indisponivelMinutos != null) { doc.setTextColor(140,80,10); doc.text(`Indisponibilidade: ${formatarDuracao(r.indisponivelMinutos)}`, 16, y); y += 5; }
    const nok = (r.checklist||[]).filter(c => c.status === 'nok');
    if (nok.length) { doc.setTextColor(200,40,40); doc.text(`Itens NÃO OK: ${nok.map(c=>c.item).join(', ')}`, 16, y, { maxWidth: W-30 }); y += 5; }
    doc.setTextColor(30); doc.setFontSize(9.5); y += 2;
  }

  doc.save(`relatorio_frota_${new Date().toISOString().slice(0,10)}.pdf`);
}

// Gera um PDF com TODOS os checklists do período (um por seção, detalhado + foto do painel)
async function gerarPdfTodosRegistros(registrosPeriodo, ini, fim, maquinas) {
  const mapaM = {};
  for (const m of (maquinas || [])) mapaM[m.id] = m;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210; let y = 0;

  doc.setFillColor(27, 58, 92); doc.rect(0, 0, W, 26, 'F');
  doc.setTextColor(255); doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
  doc.text('Checklists do período', 14, 12);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
  const periodoTxt = (ini || fim) ? `${ini ? ini.split('-').reverse().join('/') : 'início'} a ${fim ? fim.split('-').reverse().join('/') : 'hoje'}` : 'Todos os registros';
  doc.text(`Construtora Axial — ${periodoTxt} — ${registrosPeriodo.length} registro(s)`, 14, 19);
  desenharLogoPdf(doc, W);
  y = 34;

  const cron = [...registrosPeriodo].sort((a,b) => new Date(b.criadoEm) - new Date(a.criadoEm));

  for (let idx = 0; idx < cron.length; idx++) {
    const r = cron[idx];
    if (y > 245) { doc.addPage(); y = 20; }

    // título do registro
    doc.setDrawColor(220); doc.setLineWidth(0.3); doc.line(14, y, W-14, y); y += 6;
    doc.setTextColor(27,58,92); doc.setFont('helvetica','bold'); doc.setFontSize(12);
    doc.text(`${r.maquinaCodigo ? r.maquinaCodigo+' · ' : ''}${r.maquinaDescricao}`, 14, y); y += 6;

    doc.setTextColor(60); doc.setFont('helvetica','normal'); doc.setFontSize(9.5);
    doc.text(`${dataHoraBR(r.criadoEm)}`, 14, y);
    doc.text(`Operador: ${r.operador || '—'}`, 90, y);
    doc.text(`Obra: ${r.obra || '—'}`, 150, y); y += 5.5;

    const func = r.status === 'funcional';
    doc.setFont('helvetica','bold');
    doc.setTextColor(func?22:200, func?120:40, 40);
    const st = func
      ? `FUNCIONAL · ${r.horimetroNA ? 'medidor N/A' : (r.horimetro!=null ? r.horimetro+unidadeSufixo(mapaM[r.maquinaId]) : 's/ medidor')}`
      : `NÃO FUNCIONAL · ${r.motivoParada || ''}`;
    doc.text(st, 14, y); doc.setTextColor(30); doc.setFont('helvetica','normal'); y += 6;
    if (r.indisponivelMinutos != null) { doc.setTextColor(140,80,10); doc.text(`Indisponibilidade: ${formatarDuracao(r.indisponivelMinutos)}`, 14, y); doc.setTextColor(30); y += 5.5; }

    // checklist
    const itens = (r.checklist || []).filter(c => c.status);
    if (itens.length) {
      doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.text('Checklist:', 14, y); y += 5;
      doc.setFont('helvetica','normal');
      for (const c of itens) {
        if (y > 280) { doc.addPage(); y = 20; }
        const ok = c.status === 'ok';
        doc.setTextColor(ok?22:200, ok?120:40, 40); doc.setFont('helvetica','bold');
        doc.text(ok ? 'OK' : 'NÃO OK', 16, y);
        doc.setTextColor(40); doc.setFont('helvetica','normal');
        doc.text(c.item + (c.obs ? ` — ${c.obs}` : ''), 36, y, { maxWidth: W-50 }); y += 5;
      }
    }
    if (r.observacao) { doc.setFont('helvetica','italic'); doc.setTextColor(90);
      const ol = doc.splitTextToSize(`Obs: ${r.observacao}`, W-30); doc.text(ol, 14, y); doc.setTextColor(30); doc.setFont('helvetica','normal'); y += ol.length*5; }

    // fotos: painel + adicionais, em grade de miniaturas
    const urls = [];
    if (r.fotoUrl) urls.push(r.fotoUrl);
    for (const u of (r.fotosExtras || [])) urls.push(u);
    if (urls.length) {
      doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(40);
      if (y > 270) { doc.addPage(); y = 20; }
      doc.text('Fotos:', 14, y); y += 5;
      const fw = 44, fh = 33, gap = 4, perRow = 4;
      let col = 0, x = 14, rowMaxBottom = y;
      for (const u of urls) {
        const d = await imagemParaDataURL(u);
        if (!d) continue;
        if (col === perRow) { col = 0; x = 14; y = rowMaxBottom + gap; }
        if (y + fh > 287) { doc.addPage(); y = 20; col = 0; x = 14; rowMaxBottom = y; }
        try { doc.addImage(d, 'JPEG', x, y, fw, fh); } catch(e) {}
        x += fw + gap; col++; rowMaxBottom = Math.max(rowMaxBottom, y + fh);
      }
      y = rowMaxBottom;
    }
    y += 6;
  }

  doc.save(`checklists_${new Date().toISOString().slice(0,10)}.pdf`);
}

      <Filter size={15} color={COR.azul}/>

function Badge({ cor, bg, children, style }) {
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:5, padding:'3px 10px',
      borderRadius:999, fontSize:12, fontWeight:700, color:cor, background:bg,
      whiteSpace:'nowrap', ...style,
    }}>{children}</span>
  );
}

function BadgeTipo({ tipo }) {
  return tipo === 'axial'
    ? <Badge cor={COR.azul} bg="#EFF6FF"><Factory size={12} /> Axial</Badge>
    : <Badge cor="#7C3AED" bg="#F5F3FF"><Hash size={12} /> Prestador</Badge>;
}

function BadgeManutencao({ maquina }) {
  const m = calcularManutencao(maquina);
  if (m.rotulo === 'N/A') return <Badge cor={COR.cinza} bg="#F3F4F6">N/A</Badge>;
  const bg = m.vencido ? COR.vermelhoBg : (m.rotulo === 'Próxima' ? COR.amareloBg : COR.verdeBg);
  return (
    <Badge cor={m.cor} bg={bg}>
      <Wrench size={12} /> {m.rotulo}
      {m.restante != null && m.restante > 0 && <span style={{opacity:.7, fontWeight:600}}>· {m.restante}{unidadeSufixo(maquina)}</span>}
    </Badge>
  );
}

function FormMaquina({ maquina, obras, onSalvar, onCancelar }) {
  const ed = !!maquina;
  const [f, setF] = useState(maquina || {
    codigo:'', descricao:'', modelo:'', fabricante:'', numeroSerie:'',
    obra: (obras[0] && obras[0].nome) || '', tipo:'axial', unidade:'horas', empresaLocadora:'', especificacoes:{},
    possuiHorimetro:true, horimetroInicial:0, horimetroAtual:0,
    intervaloManutencao:500, horimetroUltimaManutencao:0,
    statusAtual:'funcional', ativa:true,
  });
  const [erro, setErro] = useState('');
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));
  const setEspec = (k, v) => setF(p => ({ ...p, especificacoes: { ...(p.especificacoes || {}), [k]: v } }));

  // Campos de especificação técnica (óleos e filtros) — só para máquinas axial
  const CAMPOS_ESPEC = [
    ['oleoMotor', 'Óleo do motor utilizado'],
    ['oleoHidraulico', 'Óleo hidráulico utilizado'],
    ['filtroAr1', 'Filtro de ar 1'],
    ['filtroAr2', 'Filtro de ar 2'],
    ['filtroComb1', 'Filtro de combustível 1'],
    ['filtroComb2', 'Filtro de combustível 2'],
    ['separador', 'Separador'],
    ['filtroOleo1', 'Filtro de óleo 1'],
    ['filtroOleo2', 'Filtro de óleo 2'],
  ];

  function salvar() {
    if (!f.descricao.trim()) { setErro('A descrição é obrigatória.'); return; }
    const dados = { ...f };
    // Se for novo, horímetro atual começa igual ao inicial
    if (!ed) dados.horimetroAtual = Number(f.horimetroInicial) || 0;
    onSalvar(dados);
  }

  const inputNum = (k, label, sufixo) => (
    <div>
      <label style={S.rotuloForte}>{label}</label>
      <div style={{position:'relative'}}>
        <input type="number" inputMode="numeric" value={f[k]} style={S.campo}

        {sufixo && <span style={{position:'absolute', right:13, top:'50%', transform:'translateY(-50%)', color:COR.cinza, fontSize:13, fontWeight:600}}>{sufixo}</span>}

    <div style={{maxWidth:680, margin:'0 auto'}}>

        <h2 style={{margin:0, fontSize:22, color:COR.azul, fontWeight:800}}>
          {ed ? 'Editar máquina' : 'Nova máquina'}
        </h2>
        {ed && (
          <button onClick={() => gerarPdfFichaMaquina(maquina)} style={{...S.botaoSec, marginLeft:'auto'}}>
            <Download size={18}/> Baixar PDF

      </div>

      <div style={{...S.card, display:'flex', flexDirection:'column', gap:16}}>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
          <div>
            <label style={S.rotuloForte}>Código</label>
            <input value={f.codigo} placeholder="Ex: JCB-01" style={S.campo} onChange={e => set('codigo', e.target.value)} />
          </div>
          <div>
            <label style={S.rotuloForte}>Tipo</label>
            <select value={f.tipo} style={S.campo} onChange={e => set('tipo', e.target.value)}>
              {TIPOS_MAQUINA.map(t => <option key={t.valor} value={t.valor}>{t.rotulo}</option>)}

        {f.tipo === 'prestador' && (

              <input value={f.empresaLocadora || ''} placeholder="Nome da empresa proprietária" style={{...S.campo, paddingLeft:42}} onChange={e => set('empresaLocadora', e.target.value)} />
            </div>

        <div>

          <div style={{display:'flex', gap:10}}>
            <button type="button" onClick={() => set('unidade','horas')} style={{flex:1, padding:'11px', borderRadius:10, border:`1.5px solid ${f.unidade!=='km'?COR.azul:COR.borda}`, background: f.unidade!=='km'?'#EFF6FF':'#fff', color: f.unidade!=='km'?COR.azul:COR.texto, fontSize:14.5, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>Horímetro (horas)</button>
            <button type="button" onClick={() => set('unidade','km')} style={{flex:1, padding:'11px', borderRadius:10, border:`1.5px solid ${f.unidade==='km'?COR.azul:COR.borda}`, background: f.unidade==='km'?'#EFF6FF':'#fff', color: f.unidade==='km'?COR.azul:COR.texto, fontSize:14.5, fontWeight:700, cursor:'pointer', fontFamily:'inherit'}}>Hodômetro (km)</button>

        </div>

        <label style={{display:'flex', alignItems:'center', gap:10, cursor:'pointer', fontSize:15, fontWeight:600, color:COR.texto}}>

        </label>

        {f.possuiHorimetro && (
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
            {inputNum('horimetroInicial', (f.unidade==='km'?'Hodômetro':'Horímetro')+' inicial', unidadeSufixo(f))}
            {ed && inputNum('horimetroAtual', (f.unidade==='km'?'Hodômetro':'Horímetro')+' atual', unidadeSufixo(f))}
          </div>
        )}

        {f.tipo === 'axial' && (
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
            {inputNum('intervaloManutencao', 'Intervalo de manutenção', unidadeSufixo(f))}
            {inputNum('horimetroUltimaManutencao', (f.unidade==='km'?'Hodômetro':'Horímetro')+' na última revisão', unidadeSufixo(f))}
          </div>
        )}

        {f.tipo === 'axial' && (
          <div>
            <div style={{height:1, background:COR.borda, margin:'2px 0 14px'}} />
            <label style={{...S.rotulo, fontSize:13.5, color:COR.azul}}>Especificações (óleos e filtros)</label>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginTop:4}}>
              {CAMPOS_ESPEC.map(([chave, rotulo]) => (
                <div key={chave}>
                  <label style={{...S.rotulo, fontSize:11.5}}>{rotulo}</label>
                  <input value={(f.especificacoes && f.especificacoes[chave]) || ''} placeholder="—" style={{...S.campo, padding:'9px 11px', fontSize:14}} onChange={e => setEspec(chave, e.target.value)} />
                </div>
              ))}
            </div>
          </div>
        )}

        {erro && <div style={{color:COR.vermelho, fontSize:13.5, fontWeight:600}}>{erro}</div>}

        <div style={{display:'flex', gap:10, marginTop:4}}>
          <button onClick={salvar} style={{...S.botaoPrim, flex:1}}><Save size={18} /> Salvar</button>
          <button onClick={onCancelar} style={S.botaoSec}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

          <button onClick={() => { if (novo.trim()) { onCriar(novo.trim()); setNovo(''); } }} style={{...S.botaoPrim, padding:'11px 16px'}}><Plus size={18}/></button>
        </div>

        <div style={{display:'flex', flexDirection:'column', gap:8}}>
          {obras.length === 0 && <p style={{color:COR.cinza, textAlign:'center', padding:'20px 0'}}>Nenhuma obra cadastrada.</p>}
          {obras.map(o => (
            <div key={o.id} style={{display:'flex', alignItems:'center', gap:8, padding:'10px 12px', border:`1px solid ${COR.borda}`, borderRadius:10}}>
              {editId === o.id ? (

                  <button onClick={() => { onRenomear(o.id, editNome.trim()); setEditId(null); }} style={{...S.botaoPrim, padding:'7px 12px'}}><Save size={16}/></button>
                  <button onClick={() => setEditId(null)} style={{...S.botaoSec, padding:'7px 12px'}}><X size={16}/></button>
                </>
              ) : (
                <>
                  <Building size={16} color={COR.cinza}/>
                  <span style={{flex:1, fontWeight:600, color:COR.texto}}>{o.nome}</span>
                  <button onClick={() => { setEditId(o.id); setEditNome(o.nome); }} style={{...S.botaoSec, padding:'6px 10px'}}><Edit size={15}/></button>

        </div>
        <p style={{fontSize:12, color:COR.cinza, marginTop:14, lineHeight:1.5}}>
          As obras aparecem como opção no cadastro de máquinas e servem para agrupar os relatórios.
        </p>
      </div>
    </div>
  );
}

// ============================================================
// TELA: GESTÃO DE MÁQUINAS (lista + busca + filtros)
// ============================================================
function TelaMaquinas({ maquinas, obras, onNova, onEditar, onToggleAtiva, onAbrirObras, carregando }) {
  const [busca, setBusca] = useState('');
  const [fTipo, setFTipo] = useState('todos');
  const [fObra, setFObra] = useState('todas');
  const [fMaquina, setFMaquina] = useState('todas');
  const [mostrarInativas, setMostrarInativas] = useState(false);

  // máquinas disponíveis no seletor (respeitam tipo/obra e ativas/inativas)
  const maquinasDoSeletor = maquinas
    .filter(m => (mostrarInativas || m.ativa) && (fTipo === 'todos' || m.tipo === fTipo) && (fObra === 'todas' || m.obra === fObra))
    .sort((a,b) => (a.codigo||a.descricao).localeCompare(b.codigo||b.descricao, 'pt-BR'));

  const filtradas = maquinas.filter(m => {
    if (!mostrarInativas && !m.ativa) return false;
    if (fTipo !== 'todos' && m.tipo !== fTipo) return false;
    if (fObra !== 'todas' && m.obra !== fObra) return false;
    if (fMaquina !== 'todas' && m.id !== fMaquina) return false;
    if (busca.trim()) {
      const q = busca.toLowerCase();
      const alvo = `${m.codigo} ${m.descricao} ${m.fabricante} ${m.modelo} ${m.numeroSerie} ${m.obra}`.toLowerCase();
      if (!alvo.includes(q)) return false;
    }
    return true;
  });

  const totAtivas = maquinas.filter(m => m.ativa).length;
  const totInativas = maquinas.length - totAtivas;

  return (
    <div style={{maxWidth:760, margin:'0 auto'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, marginBottom:6, flexWrap:'wrap'}}>
        <div>
          <h2 style={{margin:0, fontSize:24, fontWeight:800, color:COR.azul}}>Máquinas</h2>
          <p style={{margin:'4px 0 0', color:COR.cinza, fontSize:14}}>{totAtivas} ativas{totInativas ? ` · ${totInativas} inativas` : ''}</p>
        </div>
        <div style={{display:'flex', gap:8}}>
          <button onClick={onAbrirObras} style={S.botaoSec}><Building size={18}/> Obras</button>
          <button onClick={onNova} style={S.botaoPrim}><Plus size={18}/> Nova máquina</button>
        </div>
      </div>

      {maquinasParaRevisao(maquinas).length > 0 && (
        <div style={{margin:'16px 0 0'}}><CardRevisao maquinas={maquinas} compacto /></div>
      )}

      <div style={{...S.cardFiltro, margin:'18px 0', display:'flex', flexDirection:'column', gap:10}}>
        <CabecalhoFiltros texto="Buscar e filtrar" />
        <div style={{position:'relative'}}>
          <Search size={18} color={COR.cinza} style={{position:'absolute', left:13, top:'50%', transform:'translateY(-50%)'}} />
          <input value={busca} placeholder="Buscar por código, descrição, série…" style={{...S.campo, paddingLeft:42}} onChange={e => setBusca(e.target.value)} />
        </div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap', alignItems:'center'}}>
          <select value={fTipo} style={{...S.campo, width:'auto', padding:'9px 12px'}} onChange={e => { setFTipo(e.target.value); setFMaquina('todas'); }}>
            <option value="todos">Todos os tipos</option>
            <option value="axial">Axial</option>
            <option value="prestador">Prestador</option>
          </select>
          <select value={fObra} style={{...S.campo, width:'auto', padding:'9px 12px'}} onChange={e => { setFObra(e.target.value); setFMaquina('todas'); }}>
            <option value="todas">Todas as obras</option>
            {obras.map(o => <option key={o.id} value={o.nome}>{o.nome}</option>)}
          </select>
          <select value={fMaquina} style={{...S.campo, width:'auto', padding:'9px 12px'}} onChange={e => setFMaquina(e.target.value)}>
            <option value="todas">Todas as máquinas</option>
            {maquinasDoSeletor.map(m => <option key={m.id} value={m.id}>{m.codigo ? m.codigo+' · ' : ''}{m.descricao}</option>)}
          </select>
          {totInativas > 0 && (
            <label style={{display:'flex', alignItems:'center', gap:7, fontSize:13.5, color:COR.cinza, fontWeight:600, cursor:'pointer', marginLeft:'auto'}}>
              <input type="checkbox" checked={mostrarInativas} onChange={e => setMostrarInativas(e.target.checked)} style={{width:16, height:16}}/>
              Mostrar inativas
            </label>
          )}
        </div>
      </div>

      {carregando ? (
        <p style={{textAlign:'center', color:COR.cinza, padding:'40px 0'}}>Carregando máquinas…</p>
      ) : filtradas.length === 0 ? (
        <div style={{textAlign:'center', padding:'48px 20px', color:COR.cinza}}>
          <Factory size={40} color={COR.borda} />
          <p style={{marginTop:12, fontWeight:600}}>Nenhuma máquina encontrada.</p>
        </div>
      ) : (
        <div style={{display:'flex', flexDirection:'column', gap:12}}>
          {filtradas.map(m => <CardMaquina key={m.id} m={m} onEditar={onEditar} onToggleAtiva={onToggleAtiva} />)}
        </div>
      )}
    </div>
  );
}

function LoginAdmin({ onEntrar, onVoltar }) {
  const [senha, setSenha] = useState('');
  const [erro, setErro] = useState(false);
  function entrar() {
    if (senha === SENHA_ADMIN) onEntrar();
    else { setErro(true); setSenha(''); }
  }
  return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
      <div style={{...S.card, maxWidth:380, width:'100%', textAlign:'center', padding:28}}>
        <div style={{width:60, height:60, borderRadius:16, background:COR.azul, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px'}}>
          <Shield size={30} color="#fff" />
        </div>
        <h2 style={{margin:'0 0 6px', fontSize:22, fontWeight:800, color:COR.azul}}>Painel da Frota</h2>
        <p style={{margin:'0 0 20px', color:COR.cinza, fontSize:14}}>Acesso administrativo</p>
        <div style={{position:'relative', marginBottom:12}}>
          <Lock size={18} color={COR.cinza} style={{position:'absolute', left:13, top:'50%', transform:'translateY(-50%)'}}/>
          <input type="password" value={senha} placeholder="Senha" autoFocus
            style={{...S.campo, paddingLeft:42, borderColor: erro ? COR.vermelho : COR.borda}}
            onChange={e => { setSenha(e.target.value); setErro(false); }}
            onKeyDown={e => e.key === 'Enter' && entrar()} />
        </div>
        {erro && <p style={{color:COR.vermelho, fontSize:13, margin:'0 0 12px', fontWeight:600}}>Senha incorreta.</p>}
        <button onClick={entrar} style={{...S.botaoPrim, width:'100%'}}>Entrar</button>
        {onVoltar && <button onClick={onVoltar} style={{...S.botaoSec, width:'100%', marginTop:10, border:'none'}}>Voltar</button>}
      </div>
    </div>
  );
}
